<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WC2026 Game 1 — R32 Assignment Board</title>
<style>
:root {
  --page-bg: #05070b;
  --board-w-px: 1536px;
  --board-h-px: 1024px;
  --review-pad: 24px;
  --slotFillOpacity: .86;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--page-bg); }
body { min-height: 100vh; overflow: auto; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: white; }
.game1BoardViewport { width: max-content; min-width: calc(var(--board-w-px) + (var(--review-pad) * 2)); min-height: calc(var(--board-h-px) + (var(--review-pad) * 2)); padding: var(--review-pad); }
.pixelNativeBoardPlane { position: relative; width: var(--board-w-px); height: var(--board-h-px); background-image: radial-gradient(circle at 50% 42%, rgba(255,255,255,.10), rgba(0,0,0,.36) 62%, rgba(0,0,0,.58) 100%), linear-gradient(90deg, rgba(0,0,0,.32), rgba(0,0,0,.08) 50%, rgba(0,0,0,.32)), url("../assets/playfield/game1_pub_options_background.jpeg"); background-size: 1536px 1024px, 1536px 1024px, 1536px 1024px; background-position: 0 0, 0 0, 0 0; background-repeat: no-repeat; box-shadow: 0 0 0 1px rgba(255,255,255,0.16), 0 28px 80px rgba(0,0,0,0.55); }
.boardGeometry { position: absolute; inset: 0; width: 1536px; height: 1024px; pointer-events: none; user-select: none; }
.hitLayer, .pickLayer { position: absolute; inset: 0; width: 1536px; height: 1024px; }
.hotspot { position: absolute; padding: 0; border: 1px solid rgba(255,255,255,.12); border-radius: 7px; background: rgba(0,0,0,.04); cursor: pointer; }
.hotspot:hover, .hotspot:focus-visible { outline: 3px solid rgba(255,255,255,.92); background: rgba(255,255,255,.16); }
.pickCard { position: absolute; display: flex; align-items: center; gap: 8px; height: 40px; padding: 4px 8px; border-radius: 7px; border: 1px solid rgba(0,0,0,.55); background: rgba(250,250,248,var(--slotFillOpacity)); color: #05070b; font-weight: 800; pointer-events: none; overflow: hidden; }
.pickFlag { font-size: 22px; line-height: 1; }
.pickText { display: flex; min-width: 0; flex-direction: column; line-height: 1.05; }
.pickName { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pickRule { font-size: 9px; opacity: .64; white-space: nowrap; }
.slotLabel { position: absolute; transform: translateY(-18px); font-size: 10px; letter-spacing: .04em; color: rgba(255,255,255,.78); text-shadow: 0 1px 4px rgba(0,0,0,.9); pointer-events: none; }
.menuBackdrop { position: fixed; inset: 0; display: none; background: rgba(0,0,0,.42); z-index: 20; }
.menuBackdrop.isOpen { display: block; }
.tapMenu { position: fixed; z-index: 21; width: min(560px, calc(100vw - 32px)); max-height: min(720px, calc(100vh - 32px)); overflow: auto; border: 1px solid rgba(255,255,255,.24); border-radius: 18px; background: rgba(15,18,25,.96); box-shadow: 0 22px 70px rgba(0,0,0,.6); padding: 16px; display: none; }
.tapMenu.isOpen { display: block; }
.menuHeader { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 12px; }
.menuTitle { font-size: 18px; font-weight: 900; }
.menuSub { color: rgba(255,255,255,.72); font-size: 13px; margin-top: 4px; }
.closeBtn { border: 1px solid rgba(255,255,255,.24); background: rgba(255,255,255,.08); color: white; border-radius: 999px; padding: 8px 12px; cursor: pointer; }
.groupChips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 14px; }
.groupChip { border: 1px solid rgba(255,255,255,.22); border-radius: 999px; padding: 5px 9px; background: rgba(255,255,255,.08); font-weight: 800; font-size: 12px; }
.teamGrid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
.teamTile { display: flex; gap: 10px; align-items: center; width: 100%; text-align: left; border: 1px solid rgba(255,255,255,.18); border-radius: 14px; padding: 10px; background: rgba(255,255,255,.10); color: white; cursor: pointer; }
.teamTile:hover, .teamTile:focus-visible { outline: 2px solid white; background: rgba(255,255,255,.18); }
.teamFlag { font-size: 30px; width: 36px; text-align: center; }
.teamMeta { min-width: 0; }
.teamName { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.teamDetail { font-size: 12px; color: rgba(255,255,255,.72); }
.toolbar { position: sticky; left: 0; top: 0; z-index: 10; display: inline-flex; gap: 8px; margin-bottom: 10px; padding: 8px; border-radius: 14px; background: rgba(5,7,11,.78); backdrop-filter: blur(8px); }
.toolbar button { border: 1px solid rgba(255,255,255,.22); border-radius: 999px; background: rgba(255,255,255,.08); color: white; padding: 8px 12px; cursor: pointer; }
.visuallyHidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }
.slotFillOpacitySentinel { display:none; }

/* wc2026-game1-menu-flag-and-transparency-tune */
.groupCard {
  background: linear-gradient(180deg, rgba(16,36,61,.86), rgba(8,24,42,.82)) !important;
  backdrop-filter: blur(8px);
}
.teamChoice {
  gap: 14px !important;
  padding: 10px 12px !important;
  background: rgba(16, 40, 68, .62) !important;
  border-color: rgba(123, 174, 224, .52) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 6px 16px rgba(0,0,0,.16);
}
.teamChoice:hover,
.teamChoice:focus-visible {
  background: rgba(23, 56, 94, .78) !important;
  border-color: rgba(255, 227, 77, .86) !important;
}
.teamChoice .flag {
  font-size: 32px !important;
  width: 44px !important;
  min-width: 44px !important;
  line-height: 1 !important;
  text-align: center !important;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,.38));
}
.teamChoice .country {
  font-size: 14px !important;
  font-weight: 950 !important;
}
.teamChoice .abbr {
  font-size: 12px !important;
  opacity: .82;
}

</style>
