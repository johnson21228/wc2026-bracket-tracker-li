  const checks = Object.entries(expected).map(([slot, groups]) => {

  });

  };

</script>
  <script src="../data/game1_data_bundle.js"></script>
  <script>
    const STORAGE_KEY = "wc2026.game1.r32.picks";
    const GAME1_DATA = window.WC2026_GAME1_DATA;
    const UNIFORM_SVG_GAMEBOARD_MANIFEST = window.WC2026_UNIFORM_PICK_CARD_GAMEBOARD_MANIFEST || null;
    if (!GAME1_DATA) { throw new Error("WC2026 Game 1 data bundle did not load."); }
    const SLOT_RULES = GAME1_DATA.slotRules;
    const GROUPS = GAME1_DATA.groups;
    const TEAMS = GAME1_DATA.teams;
    const hitLayer = document.getElementById("hitLayer");
    const pickLayer = document.getElementById("pickLayer");
    const menu = document.getElementById("tapMenu");
    const backdrop = document.getElementById("menuBackdrop");
    const menuTitle = document.getElementById("menuTitle");
    const menuSub = document.getElementById("menuSub");
    const groupChips = document.getElementById("groupChips");
    const teamGrid = document.getElementById("teamGrid");
    const pickDetails = document.getElementById("r32PickDetails");
    let activeSlot = null;

    function validateUniformSvgGameboardManifestForGame1(manifest) {
      const result = {
        status: "missing",
        boardModelId: "",
        slotCount: 0,
        roundCounts: {},
        errors: []
      };
      if (!manifest || typeof manifest !== "object") {
        result.errors.push("uniform SVG gameboard manifest is not loaded");
        return result;
      }
      result.status = "loaded";
      result.boardModelId = manifest.boardModel?.id || "";
      const size = manifest.nativeSizePx || {};
      if (Number(size.width) !== 1536 || Number(size.height) !== 1024) {
        result.errors.push("native board size is not 1536x1024");
      }
      const slots = Array.isArray(manifest.slots) ? manifest.slots : [];
      result.slotCount = slots.length;
      for (const slot of slots) {
        const round = slot.round || "UNKNOWN";
        result.roundCounts[round] = (result.roundCounts[round] || 0) + 1;
        const b = slot.boundsPx || {};
        const w = b.w ?? b.width;
        const h = b.h ?? b.height;
        if (![b.x, b.y, w, h].every(Number.isFinite)) {
          result.errors.push(`slot ${slot.slotId || "unknown"} has incomplete boundsPx`);
        }
      }
      const expected = {R32: 32, R16: 16, QF: 8, SF: 4, FINAL_FOUR: 1};
      const expectedTotal = Object.values(expected).reduce((sum, value) => sum + value, 0);
      if (result.slotCount !== expectedTotal) {
        result.errors.push(`expected ${expectedTotal} manifest slots; found ${result.slotCount}`);
      }
      for (const [round, count] of Object.entries(expected)) {
        if ((result.roundCounts[round] || 0) !== count) {
          result.errors.push(`expected ${count} ${round} slots; found ${result.roundCounts[round] || 0}`);
        }
      }
      result.status = result.errors.length ? "invalid" : "valid";
      return result;
    }

    const uniformSvgManifestProbe = validateUniformSvgGameboardManifestForGame1(UNIFORM_SVG_GAMEBOARD_MANIFEST);
    const boardPlane = document.querySelector(".pixelNativeBoardPlane");
    if (boardPlane) {
      boardPlane.dataset.uniformSvgManifestMode = "game1-transparent-svg-middle-layer";
      boardPlane.dataset.uniformSvgBoardVisual = "visible";
      boardPlane.dataset.uniformSvgPlacementMode = "uniform-svg-r32-manifest";
      boardPlane.dataset.uniformSvgBoardPresentation = "material-linework-prominent-r32";
      boardPlane.dataset.uniformSvgManifestStatus = uniformSvgManifestProbe.status;
      boardPlane.dataset.uniformSvgManifestSlotCount = String(uniformSvgManifestProbe.slotCount || 0);
      boardPlane.dataset.uniformSvgManifestBoardModel = uniformSvgManifestProbe.boardModelId || "unknown";
    }
    window.WC2026_GAME1_UNIFORM_SVG_MANIFEST_PROBE = uniformSvgManifestProbe;
    if (uniformSvgManifestProbe.status !== "valid") {
      console.warn("WC2026 Game 1 uniform SVG manifest probe failed", uniformSvgManifestProbe);
    }


    function normalizeUniformSvgManifestBounds(bounds) {
      const b = bounds || {};
      return {
        x: Number(b.x),
        y: Number(b.y),
        w: Number(b.w ?? b.width),
        h: Number(b.h ?? b.height)
      };
    }
    function applyUniformSvgR32ManifestGeometryToGame1SlotRules(manifest, slotRules) {
      const result = {status: "not_applied", mapped: 0, errors: []};
      const slots = Array.isArray(manifest?.slots) ? manifest.slots : [];
      const r32Slots = slots
        .filter(slot => slot.round === "R32")
        .slice()
        .sort((a, b) => {
          const sideOrder = {left: 0, right: 1};
          const aSide = sideOrder[a.side] ?? 9;
          const bSide = sideOrder[b.side] ?? 9;
          if (aSide !== bSide) return aSide - bSide;
          return Number(a.roundIndex || 0) - Number(b.roundIndex || 0);
        });
      if (r32Slots.length !== 32) {
        result.errors.push(`expected 32 R32 manifest slots; found ${r32Slots.length}`);
        return result;
      }
      const rules = (slotRules || []).slice().sort((a, b) => Number(a.position || 0) - Number(b.position || 0));
      if (rules.length !== 32) {
        result.errors.push(`expected 32 Game 1 slot rules; found ${rules.length}`);
        return result;
      }
      rules.forEach((rule, index) => {
        const manifestSlot = r32Slots[index];
        const b = normalizeUniformSvgManifestBounds(manifestSlot.boundsPx);
        if (![b.x, b.y, b.w, b.h].every(Number.isFinite)) {
          result.errors.push(`manifest slot ${manifestSlot.slotId || index} has invalid bounds`);
          return;
        }
        rule.uniformSvgSlotId = manifestSlot.slotId;
        rule.uniformSvgRoundIndex = manifestSlot.roundIndex;
        rule.uniformSvgGeometrySource = "site/data/geometry/uniform_pick_card_gameboard_manifest.json";
        rule.boundsPx = {x: b.x, y: b.y, w: b.w, h: b.h};
        rule.hitRegionPx = {type: "rect", x: b.x, y: b.y, w: b.w, h: b.h};
        result.mapped += 1;
      });
      result.status = result.errors.length ? "invalid" : "applied";

    }
