<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>World Cup 2026 Game 1</title>
<style>
:root {
  --ink:#f8fbff; --muted:#b7c4d8; --accent:#ffe34d;
  --pub-opacity:.42; --bracket-opacity:.95; --wash-opacity:.16;
  --slot-fill:.82; --slot-border:.90; --slot-label:.96;
}
* { box-sizing:border-box; }
body { margin:0; background:#030812; color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
header,.controls { background:#07111f; border-bottom:1px solid #203b57; padding:10px 16px; }
h1 { margin:0; font-size:22px; }
.sub { color:var(--muted); font-size:13px; margin-top:3px; }
.controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
button,input,select { font:inherit; }
button,select,input { border:1px solid #35638f; color:var(--ink); background:#143250; border-radius:10px; padding:8px 10px; }
input[type="range"] { padding:0; width:110px; vertical-align:middle; }
input { background:#0b1a2d; }
.main { padding:12px; }
.panel { background:rgba(9,20,35,.88); border:1px solid #254a6f; border-radius:18px; padding:12px; }
.status { display:flex; justify-content:space-between; color:var(--muted); font-weight:800; margin-bottom:8px; }
.scroller { overflow:auto; max-height:calc(100vh - 152px); -webkit-overflow-scrolling:touch; }
.board { position:relative; width:1536px; max-width:none; aspect-ratio:3/2; margin:0 auto; overflow:hidden; border-radius:14px; border:1px solid #254a6f; background:#06101c; }
.pubGameBg { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; background:#050b13; }
.pubGameBg img { width:100%; height:100%; object-fit:cover; opacity:var(--pub-opacity); filter:saturate(1.08) contrast(.98) brightness(.92); }
.pubGameBg::after { content:""; position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.08),rgba(3,8,18,.44) 78%),linear-gradient(90deg,rgba(3,8,18,.26),rgba(3,8,18,.05) 50%,rgba(3,8,18,.26)); }
.wash { position:absolute; inset:0; z-index:1; opacity:var(--wash-opacity); pointer-events:none; background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.28) 0,rgba(255,255,255,.14) 44%,rgba(255,255,255,.04) 100%),radial-gradient(circle at 50% 42%,rgba(4,10,20,.18) 0,rgba(4,10,20,.38) 62%,rgba(4,10,20,.60) 100%); }
.bracketGeometry { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:var(--bracket-opacity); pointer-events:none; z-index:2; }
.topTitle { position:absolute; left:3%; right:3%; top:1.4%; height:9%; display:flex; align-items:center; justify-content:center; pointer-events:none; text-align:center; z-index:3; }
.topTitle h2 { margin:0; font-size:38px; letter-spacing:.04em; color:#f8fbff; text-shadow:0 2px 6px rgba(0,0,0,.8); }
.hitLayer { position:absolute; inset:0; z-index:50; pointer-events:none; }
.hotspot { position:absolute; z-index:51; border:2px solid rgba(255,255,255,var(--slot-border)); background:rgba(5,18,34,var(--slot-fill)); border-radius:8px; padding:0; cursor:pointer; pointer-events:auto; appearance:none; -webkit-appearance:none; box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 2px 10px rgba(0,0,0,.42); backdrop-filter:blur(1.5px); }
.hotspot:hover,.hotspot.active { border-color:rgba(255,227,77,.98); background:rgba(22,48,76,.94); box-shadow:0 0 0 3px rgba(255,227,77,.28),inset 0 0 0 1px rgba(255,255,255,.26),0 2px 12px rgba(0,0,0,.45); }
.showHitZones .hotspot { border-color:rgba(255,60,60,.96); background:rgba(255,60,60,.34); box-shadow:0 0 0 2px rgba(255,255,255,.32) inset,0 0 0 3px rgba(255,60,60,.18); }
.hotspot .rule { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,var(--slot-label)); font-weight:950; font-size:12px; text-shadow:0 1px 2px rgba(0,0,0,.92); pointer-events:none; }
.hotspot.picked .rule { display:none; }
.hotspot .pick { position:absolute; inset:0; display:flex; align-items:center; gap:4px; justify-content:center; padding:2px 5px; color:#fff; font-weight:950; font-size:12px; line-height:1; text-shadow:0 1px 2px rgba(0,0,0,.94); pointer-events:none; }
.hotspot .flag { font-size:18px; }
.modalBackdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:1000; padding:18px; }
.modalBackdrop.open { display:flex; }
.modal { width:min(430px,94vw); max-height:88vh; overflow:auto; background:linear-gradient(180deg,#10243d,#071423); border:1px solid #4a739c; border-radius:18px; box-shadow:0 18px 60px rgba(0,0,0,.55); padding:16px; }
.modalHead { display:flex; justify-content:space-between; align-items:center; }
.closeBtn { font-size:22px; padding:5px 10px; background:#0a1728; }
.ruleBig { font-size:30px; color:var(--accent); font-weight:950; margin-top:12px; }
.long,.small { color:var(--muted); }
.choices { display:grid; gap:8px; margin-top:12px; }
.choice { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:#102844; }
.choice .flag { font-size:24px; width:30px; }
.choice .name { font-weight:850; }
.choice .meta { color:var(--muted); font-size:12px; margin-left:auto; }
.danger { background:#592234; border-color:#b44963; }
textarea { width:100%; min-height:110px; background:#06101c; color:var(--ink); border:1px solid #31577a; border-radius:12px; padding:10px; font-family:ui-monospace,monospace; font-size:12px; margin-top:10px; }
</style>
</head>
<body>
<header><h1>World Cup 2026 Game 1</h1><div class="sub">Tap a Round-of-32 slot. The chooser opens from the official slot rule.</div></header>
<div class="controls">
  <label>Pub BG <input id="pubOpacity" type="range" min="0" max="0.85" step="0.01" value="0.42"/></label>
  <label>Bracket <input id="bracketOpacity" type="range" min="0.2" max="1" step="0.01" value="0.95"/></label>
  <label>Wash <input id="washOpacity" type="range" min="0" max="0.7" step="0.01" value="0.16"/></label>
  <label>Slot Fill <input id="slotFillOpacity" type="range" min="0.15" max="1" step="0.01" value="0.82"/></label>
  <label>Slot Border <input id="slotBorder" type="range" min="0.15" max="1" step="0.01" value="0.90"/></label>
  <label><input id="showHitZones" type="checkbox"/> Show hit zones</label>
  <input id="playerName" placeholder="Player name"/>
  <button id="exportBtn">Export JSON</button>
  <button id="importBtn">Import JSON</button>
  <button id="clearBtn">Clear picks</button>
</div>
<main class="main">
  <section class="panel">
    <div class="status"><span id="pickedCount">0 / 32 picked</span><span id="hitStatus">initializing hit targets</span></div>
    <div class="scroller">
      <div id="board" class="board">
        <div class="pubGameBg" aria-hidden="true"><img src="../assets/playfield/game1_pub_options_background.jpeg" alt=""/></div>
        <div class="wash" aria-hidden="true"></div>
        <img class="bracketGeometry" src="../assets/playfield/r32_bracket_geometry_overlay.png" alt="Round of 32 bracket geometry"/>

        <div id="hitLayer" class="hitLayer" aria-label="Round of 32 pick targets"></div>
      </div>
    </div>
    <textarea id="jsonBox" placeholder="Exported/imported picks JSON appears here"></textarea>
  </section>
</main>
<div id="modalBackdrop" class="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modalHead"><h3 id="modalTitle">Choose team</h3><button id="closeModal" class="closeBtn" aria-label="Close">×</button></div>
    <div id="ruleBig" class="ruleBig"></div>
    <div id="ruleLong" class="long"></div>
    <div id="choices" class="choices"></div>
    <button id="clearSlot" class="danger">Clear this slot</button>
  </div>
</div>

const RULES = {"R32-L-M1A": {"match": 73, "short": "2A", "long": "Runner-up Group A"}, "R32-L-M1B": {"match": 73, "short": "2B", "long": "Runner-up Group B"}, "R32-L-M2A": {"match": 75, "short": "1F", "long": "Winner Group F"}, "R32-L-M2B": {"match": 75, "short": "2C", "long": "Runner-up Group C"}, "R32-L-M3A": {"match": 74, "short": "1E", "long": "Winner Group E"}, "R32-L-M3B": {"match": 74, "short": "3 A/B/C/D/F", "long": "Best third-place team from Groups A/B/C/D/F"}, "R32-L-M4A": {"match": 77, "short": "1I", "long": "Winner Group I"}, "R32-L-M4B": {"match": 77, "short": "3 C/D/F/G/H", "long": "Best third-place team from Groups C/D/F/G/H"}, "R32-L-M5A": {"match": 76, "short": "1C", "long": "Winner Group C"}, "R32-L-M5B": {"match": 76, "short": "2F", "long": "Runner-up Group F"}, "R32-L-M6A": {"match": 78, "short": "2E", "long": "Runner-up Group E"}, "R32-L-M6B": {"match": 78, "short": "2I", "long": "Runner-up Group I"}, "R32-L-M7A": {"match": 79, "short": "1A", "long": "Winner Group A"}, "R32-L-M7B": {"match": 79, "short": "3 C/E/F/H/I", "long": "Best third-place team from Groups C/E/F/H/I"}, "R32-L-M8A": {"match": 80, "short": "1L", "long": "Winner Group L"}, "R32-L-M8B": {"match": 80, "short": "3 E/H/I/J/K", "long": "Best third-place team from Groups E/H/I/J/K"}, "R32-R-M1A": {"match": 83, "short": "2K", "long": "Runner-up Group K"}, "R32-R-M1B": {"match": 83, "short": "2L", "long": "Runner-up Group L"}, "R32-R-M2A": {"match": 84, "short": "1H", "long": "Winner Group H"}, "R32-R-M2B": {"match": 84, "short": "2J", "long": "Runner-up Group J"}, "R32-R-M3A": {"match": 81, "short": "1D", "long": "Winner Group D"}, "R32-R-M3B": {"match": 81, "short": "3 B/E/F/I/J", "long": "Best third-place team from Groups B/E/F/I/J"}, "R32-R-M4A": {"match": 82, "short": "1G", "long": "Winner Group G"}, "R32-R-M4B": {"match": 82, "short": "3 A/E/H/I/J", "long": "Best third-place team from Groups A/E/H/I/J"}, "R32-R-M5A": {"match": 86, "short": "1J", "long": "Winner Group J"}, "R32-R-M5B": {"match": 86, "short": "2H", "long": "Runner-up Group H"}, "R32-R-M6A": {"match": 88, "short": "2D", "long": "Runner-up Group D"}, "R32-R-M6B": {"match": 88, "short": "2G", "long": "Runner-up Group G"}, "R32-R-M7A": {"match": 85, "short": "1B", "long": "Winner Group B"}, "R32-R-M7B": {"match": 85, "short": "3 E/F/G/I/J", "long": "Best third-place team from Groups E/F/G/I/J"}, "R32-R-M8A": {"match": 87, "short": "1K", "long": "Winner Group K"}, "R32-R-M8B": {"match": 87, "short": "3 D/E/I/J/L", "long": "Best third-place team from Groups D/E/I/J/L"}};
const HOTSPOTS = [["R32-L-M1A", 2.5, 13.8, 8.9, 4.0], ["R32-L-M1B", 2.5, 18.2, 8.9, 4.0], ["R32-L-M2A", 2.5, 23.0, 8.9, 4.0], ["R32-L-M2B", 2.5, 27.4, 8.9, 4.0], ["R32-L-M3A", 2.5, 32.2, 8.9, 4.0], ["R32-L-M3B", 2.5, 36.6, 8.9, 4.0], ["R32-L-M4A", 2.5, 41.4, 8.9, 4.0], ["R32-L-M4B", 2.5, 45.8, 8.9, 4.0], ["R32-L-M5A", 2.5, 51.0, 8.9, 4.0], ["R32-L-M5B", 2.5, 55.4, 8.9, 4.0], ["R32-L-M6A", 2.5, 60.2, 8.9, 4.0], ["R32-L-M6B", 2.5, 64.6, 8.9, 4.0], ["R32-L-M7A", 2.5, 69.4, 8.9, 4.0], ["R32-L-M7B", 2.5, 73.8, 8.9, 4.0], ["R32-L-M8A", 2.5, 78.6, 8.9, 4.0], ["R32-L-M8B", 2.5, 83.0, 8.9, 4.0], ["R32-R-M1A", 88.6, 13.8, 8.9, 4.0], ["R32-R-M1B", 88.6, 18.2, 8.9, 4.0], ["R32-R-M2A", 88.6, 23.0, 8.9, 4.0], ["R32-R-M2B", 88.6, 27.4, 8.9, 4.0], ["R32-R-M3A", 88.6, 32.2, 8.9, 4.0], ["R32-R-M3B", 88.6, 36.6, 8.9, 4.0], ["R32-R-M4A", 88.6, 41.4, 8.9, 4.0], ["R32-R-M4B", 88.6, 45.8, 8.9, 4.0], ["R32-R-M5A", 88.6, 51.0, 8.9, 4.0], ["R32-R-M5B", 88.6, 55.4, 8.9, 4.0], ["R32-R-M6A", 88.6, 60.2, 8.9, 4.0], ["R32-R-M6B", 88.6, 64.6, 8.9, 4.0], ["R32-R-M7A", 88.6, 69.4, 8.9, 4.0], ["R32-R-M7B", 88.6, 73.8, 8.9, 4.0], ["R32-R-M8A", 88.6, 78.6, 8.9, 4.0], ["R32-R-M8B", 88.6, 83.0, 8.9, 4.0]];
const STORAGE_KEY = "wc2026.game1.reset.visible.hit.layer.v1";
let state = {version:"game1-reset-visible-hit-layer-v1", playerName:"", picks:{}};
let activeSlot = null;
const $ = (id)=>document.getElementById(id);
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) state={...state,...JSON.parse(raw)}; }catch(e){ console.warn(e); } $("playerName").value=state.playerName||""; }
function makeHotspots(){
  const layer = $("hitLayer");
  layer.innerHTML = "";
  HOTSPOTS.forEach(([id,x,y,w,h])=>{
    const btn=document.createElement("button");
    btn.type="button"; btn.className="hotspot"; btn.dataset.slot=id;
    btn.setAttribute("aria-label", `${RULES[id]?.short || id}: ${RULES[id]?.long || "Choose team"}`);
    Object.assign(btn.style, {left:x+"%", top:y+"%", width:w+"%", height:h+"%"});
    btn.innerHTML = `<span class="rule">${RULES[id]?.short || ""}</span>`;
    btn.addEventListener("click", (ev)=>{ ev.preventDefault(); ev.stopPropagation(); openChooser(id); });
    layer.appendChild(btn);
  });
  const count = layer.querySelectorAll(".hotspot").length;
  $("hitStatus").textContent = `${count} opaque hit targets active`;
  console.log("game1_reset_visible_hit_layer", count);
  console.log("game1_runtime_duplicate_state_and_slotfill_fix", "ok");
}

function groupsForSlotRule(slot){
  const rule = RULES[slot] || {};
  const short = String(rule.short || "").trim().toUpperCase();
  const long = String(rule.long || "").trim();
  const source = `${short} ${long}`.toUpperCase();

  // Direct winner/runner-up slots: 1A, 2F, etc.
  const direct = short.match(/^[12]([A-L])$/);
  if (direct) return [direct[1]];

  // Third-place slots: 3 A/B/C/D/F, 3A/B/C/D/F, or long text mentioning Groups A/B/C/D/F.
  const third = source.match(/3\s*([A-L](?:\/[A-L])*)/);
  if (third) return third[1].split("/").filter(Boolean);

  const groupsText = source.match(/GROUPS?\s+([A-L](?:\/[A-L])*)/i);
  if (groupsText) return groupsText[1].toUpperCase().split("/").filter(Boolean);

  return [];
}

function eligibleTeamsForSlot(slot){
  const groups = groupsForSlotRule(slot);
  if (!groups.length) return TEAMS;
  const allowed = new Set(groups);
  return TEAMS.filter(t => allowed.has(String(t.group || "").toUpperCase()));
}

function openChooser(slot){
  activeSlot=slot;
  document.querySelectorAll(".hotspot").forEach(h=>h.classList.toggle("active", h.dataset.slot===slot));
  const rule=RULES[slot]||{short:slot,long:"Choose team"};
  $("modalTitle").textContent = `Choose ${slot}`;
  $("ruleBig").textContent = rule.short || slot;
  const allowedGroups = groupsForSlotRule(slot);
  $("ruleLong").textContent = `${rule.long || "Choose team"}${allowedGroups.length ? ` · Menu: Group ${allowedGroups.join("/")}` : ""}`;
  const choices=$("choices"); choices.innerHTML="";
  eligibleTeamsForSlot(slot).forEach(t=>{
    const b=document.createElement("button"); b.type="button"; b.className="choice";
    b.innerHTML=`<span class="flag">${t.flag}</span><span class="name">${t.display||t.name}</span><span class="meta">${t.group} · ${t.abbr}</span>`;
    b.addEventListener("click",()=>{ state.picks[slot]={abbr:t.abbr,name:t.display||t.name,flag:t.flag,group:t.group}; save(); closeChooser(); render(); });
    choices.appendChild(b);
  });
  $("modalBackdrop").classList.add("open");
}
function closeChooser(){ $("modalBackdrop").classList.remove("open"); activeSlot=null; document.querySelectorAll(".hotspot").forEach(h=>h.classList.remove("active")); }
function render(){
  document.querySelectorAll(".hotspot").forEach(h=>{
    const pick=state.picks[h.dataset.slot];
    h.classList.toggle("picked", !!pick);
    h.innerHTML = pick ? `<span class="pick"><span class="flag">${pick.flag}</span><span>${pick.abbr}</span></span>` : `<span class="rule">${RULES[h.dataset.slot]?.short || ""}</span>`;
  });
  $("pickedCount").textContent = `${Object.keys(state.picks||{}).length} / 32 picked`;
}
function bindRange(id, varName, storeKey){
  const el=$(id); if(!el) return;
  const saved=localStorage.getItem(storeKey); if(saved!==null) el.value=saved;
  document.documentElement.style.setProperty(varName, el.value);
  el.addEventListener("input",()=>{ document.documentElement.style.setProperty(varName, el.value); localStorage.setItem(storeKey, el.value); });
}
function initControls(){
  bindRange("pubOpacity", "--pub-opacity", "wc2026.pubOpacity");
  bindRange("bracketOpacity", "--bracket-opacity", "wc2026.bracketOpacity");
  bindRange("washOpacity", "--wash-opacity", "wc2026.washOpacity");
  bindRange("slotFillOpacity", "--slot-fill", "wc2026.slotFillOpacity");
  bindRange("slotBorder", "--slot-border", "wc2026.slotBorder");
  $("showHitZones").addEventListener("change", e=>document.body.classList.toggle("showHitZones", e.target.checked));
  $("playerName").addEventListener("input", e=>{ state.playerName=e.target.value; save(); });
  $("closeModal").addEventListener("click", closeChooser);
  $("modalBackdrop").addEventListener("click", e=>{ if(e.target.id==="modalBackdrop") closeChooser(); });
  $("clearSlot").addEventListener("click",()=>{ if(activeSlot){ delete state.picks[activeSlot]; save(); render(); closeChooser(); } });
  $("clearBtn").addEventListener("click",()=>{ if(confirm("Clear all Game 1 picks?")){ state.picks={}; save(); render(); } });
  $("exportBtn").addEventListener("click",()=>{ $("jsonBox").value=JSON.stringify(state,null,2); });
  $("importBtn").addEventListener("click",()=>{ try{ const incoming=JSON.parse($("jsonBox").value); state={...state,...incoming, picks:incoming.picks||{}}; save(); render(); }catch(e){ alert("Invalid JSON"); } });
}
function boot(){ load(); makeHotspots(); render(); initControls(); }
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
console.log("game1_group_filtered_tap_menu_restore", "ok");
