<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WC2026 Bracket Tracker</title>
  <link rel="preload" as="image" href="assets/board/knockout_pub_background.jpeg">
  <link rel="preload" as="image" href="assets/board/gameboard.svg">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/dev.css">
</head>
<body>
  <main id="wc2026-app" class="wc2026-app" data-wc2026-app>
    <section class="app-shell" aria-labelledby="app-title">
      <header class="app-header">
        <p class="eyebrow">Footie FÜHN</p>
        <h1 id="app-title">Braketeering Pub</h1>
        <p class="app-summary">Scroll the game board below and make your picks.</p>
        <div class="app-actions">
          <button type="button" class="ghost-button" data-action="clear-all">Clear picks</button>
          <button type="button" class="ghost-button" data-action="export-picks">Export picks</button>
          <button type="button" class="ghost-button" data-action="import-picks">Import picks</button>
          <input type="file" class="visually-hidden" data-import-picks-file accept="application/json,.json" aria-label="Import picks JSON file">
        </div>
      </header>
      <div class="board-scroll" data-board-scroll>
        <section class="pixel-native-board-plane" data-board-plane aria-label="World Cup bracket board"></section>
      </div>
      <section class="status-panel" data-status-panel aria-live="polite"></section>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
