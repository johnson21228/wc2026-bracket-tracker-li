<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WC2026 Bracket Tracker</title>
  <link rel="preload" as="image" href="assets/board/pub_background.jpeg">
  <link rel="preload" as="image" href="assets/board/gameboard.svg">
  <link rel="stylesheet" href="css/app.css?v=zoom-runtime-7414af9">
  <link rel="stylesheet" href="css/board.css?v=zoom-runtime-7414af9">
  <link rel="stylesheet" href="css/dev.css?v=zoom-runtime-7414af9">
</head>
<body>
  <main id="wc2026-app" class="wc2026-app" data-wc2026-app>
    <section class="app-shell" aria-labelledby="app-title">
      <header class="app-header">
        <p class="eyebrow">World Cup 2026</p>
        <h1 id="app-title">FIFA Bracketeering</h1>
        <p class="app-summary">Scroll and zoom the game board below and make your picks.</p>
        <div class="supabase-identity-surface" data-supabase-identity-surface data-auth-disabled="true" aria-label="Player sign-in status">
          <div class="identity-card" data-auth-state="initializing">
            <div class="identity-summary">
              <span class="identity-kicker">Player</span>
              <strong class="identity-title">Local bracket active</strong>
              <span class="identity-detail">Sign-in paused</span>
            </div>
          </div>
        </div>
        <div class="app-actions">
          <button type="button" class="ghost-button" data-action="clear-all">Clear picks</button>
        <div class="board-zoom-controls" data-board-zoom-controls>
          <label for="board-zoom-select">Board zoom</label>
          <select id="board-zoom-select" data-board-zoom aria-label="Board zoom">
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
          </select>
        </div></div>
      </header>
      <div class="board-scroll" data-board-scroll>
        <div class="board-scale-frame" data-board-scale-frame>
          <section class="pixel-native-board-plane" data-board-plane aria-label="World Cup bracket board"></section>
        </div>
      </div>
      <section class="status-panel" data-status-panel aria-live="polite"></section>
    </section>
  </main>
  <script type="module" src="js/app.js?v=zoom-runtime-7414af9"></script>
</body>
</html>
