<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WC2026 Game 2 — Scrollable Board Only</title>
<style>
:root {
  --page-bg: #05070b;
  --board-w-px: 1536px;
  --board-h-px: 1024px;
  --review-pad: 24px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  background: var(--page-bg);
}
body {
  min-height: 100vh;
  overflow: auto;
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.game2BoardOnlyViewport {
  width: max-content;
  min-width: calc(var(--board-w-px) + (var(--review-pad) * 2));
  min-height: calc(var(--board-h-px) + (var(--review-pad) * 2));
  padding: var(--review-pad);
}
.pixelNativeBoardPlane {
  position: relative;
  width: var(--board-w-px);
  height: var(--board-h-px);
  background-image: url("../assets/playfield/r32_bracket_geometry_overlay.png");
  background-repeat: no-repeat;
  background-size: 1536px 1024px;
  background-position: 0 0;
  image-rendering: auto;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.16), 0 28px 80px rgba(0,0,0,0.55);
}
.pixelNativeBoardPlane::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.visuallyHidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}
/* wc2026-shared-pub-background-layer */
html, body { min-height:100%; }
body {
  background-color:#050506 !important;
  background-image:
    radial-gradient(circle at 50% 42%, rgba(255,255,255,.10), rgba(0,0,0,.52) 62%, rgba(0,0,0,.80) 100%),
    linear-gradient(90deg, rgba(0,0,0,.45), rgba(0,0,0,.16) 50%, rgba(0,0,0,.45)),
    url('../assets/playfield/game1_pub_options_background.jpeg') !important;
  background-size:cover, cover, cover !important;
  background-position:center center, center center, center center !important;
  background-attachment:fixed, fixed, fixed !important;
}
.gameBoard, .board, .boardPlane, .boardSurface {
  background-color:transparent !important;
}
/* wc2026-shared-background-scrolls-with-board */
html, body {
  background-color:#050506 !important;
}
body {
  background-image:none !important;
  background-attachment:scroll !important;
}
.board .pubGameBg,
.gameBoard .pubLayer {
  position:absolute !important;
  inset:0 !important;
  background-attachment:scroll !important;
  transform:none !important;
  pointer-events:none !important;
}
.board .pubGameBg img {
  width:100% !important;
  height:100% !important;
  object-fit:cover !important;
}
.board .bracketGeometry {
  width:100% !important;
  height:100% !important;
  object-fit:fill !important;
}
.pixelNativeBoardPlane {
  background-image:
    url("../assets/playfield/r32_bracket_geometry_overlay.png"),
    radial-gradient(circle at 50% 42%, rgba(255,255,255,.10), rgba(0,0,0,.36) 62%, rgba(0,0,0,.58) 100%),
    linear-gradient(90deg, rgba(0,0,0,.32), rgba(0,0,0,.08) 50%, rgba(0,0,0,.32)),
    url("../assets/playfield/game1_pub_options_background.jpeg") !important;
  background-size:
    1536px 1024px,
    1536px 1024px,
    1536px 1024px,
    1536px 1024px !important;
  background-position:0 0, 0 0, 0 0, 0 0 !important;
  background-repeat:no-repeat, no-repeat, no-repeat, no-repeat !important;
  background-attachment:scroll, scroll, scroll, scroll !important;
}
</style>
</head>
<body>
  <main class="game2BoardOnlyViewport" aria-label="Game 2 scrollable board-only source review surface">
    <h1 class="visuallyHidden">Game 2 Scrollable Board Only</h1>
    <section
      class="pixelNativeBoardPlane"
      aria-label="Shared 1536 by 1024 pixel-native R32 game board image only, displayed at native pixel size"
      data-board-source="site/assets/playfield/r32_bracket_geometry_overlay.png"
      data-native-width="1536"
      data-native-height="1024"
      data-display-mode="native-pixel-scrollable"
    ></section>
  </main>
</body>
</html>
