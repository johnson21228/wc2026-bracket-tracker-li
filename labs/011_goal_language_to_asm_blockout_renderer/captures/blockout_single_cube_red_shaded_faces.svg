<svg xmlns="http://www.w3.org/2000/svg" width="84" height="80" viewBox="0 0 84 80" role="img" aria-labelledby="title desc">
  <title id="title">Lab 011 single cube solid red shaded polygon proof</title>
  <desc id="desc">One projected cube inside the perspective pit, decomposed into solid red shaded polygon faces.</desc>
  <style>
    .bg { fill: #11131a; }
    .cube { stroke: #ffcccc; stroke-width: 1.2; vector-effect: non-scaling-stroke; }
    .red_light { fill: #ff4a3d; }
    .red_mid { fill: #d92f2b; }
    .red_mid_dark { fill: #b32124; }
    .red_dark { fill: #8f171d; }
    .red_deep { fill: #661016; }
    .label { fill: #ffe3e3; font: 9px monospace; }
  </style>
  <rect class="bg" x="0" y="0" width="84" height="80" />
  <polygon class="cube north_wall red_dark" points="30,29 54,29 56,28 28,28" />
  <polygon class="cube east_wall red_mid" points="54,29 54,47 56,48 56,28" />
  <polygon class="cube south_wall red_deep" points="54,47 30,47 28,48 56,48" />
  <polygon class="cube west_wall red_mid_dark" points="30,47 30,29 28,28 28,48" />
  <polygon class="cube top_face red_light" points="28,28 56,28 56,48 28,48" />
  <text class="label" x="6" y="12">single cube · solid red shaded faces</text>
</svg>
