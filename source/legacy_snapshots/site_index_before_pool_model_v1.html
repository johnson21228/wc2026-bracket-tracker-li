}
.pickCard {

.pickCard:hover, .pickCard:focus-visible { outline: 3px solid rgba(255,255,255,.92); z-index: 5; }
.pickCard::after { content: attr(data-tooltip); position: absolute; left: 0; top: calc(100% + 8px); width: max-content; max-width: 280px; white-space: pre-line; padding: 9px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,.22); background: rgba(10,12,18,.97); color: white; font-size: 12px; line-height: 1.3; font-weight: 700; box-shadow: 0 12px 32px rgba(0,0,0,.45); opacity: 0; transform: translateY(-4px); pointer-events: none; transition: opacity .12s ease, transform .12s ease; z-index: 30; }

.slotLabel { position: absolute; transform: translateY(-18px); font-size: 10px; letter-spacing: .04em; color: rgba(255,255,255,.78); text-shadow: 0 1px 4px rgba(0,0,0,.9); pointer-events: none; }

.menuSub { color: rgba(255,255,255,.72); font-size: 13px; margin-top: 4px; }

.groupChip { border: 1px solid rgba(255,255,255,.22); border-radius: 999px; padding: 5px 9px; background: rgba(255,255,255,.08); font-weight: 800; font-size: 12px; }
.teamGrid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
.teamTile { display: flex; gap: 10px; align-items: center; width: 100%; text-align: left; border: 1px solid rgba(255,255,255,.18); border-radius: 14px; padding: 10px; background: rgba(255,255,255,.10); color: white; cursor: pointer; }

.teamName { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.teamDetail { display: inline-block; margin-left: 14px; font-size: 12px; color: rgba(255,255,255,.72); white-space: nowrap; }
.toolbar { position: sticky; left: 0; top: 0; z-index: 10; display: inline-flex; gap: 8px; margin-bottom: 10px; padding: 8px; border-radius: 14px; background: rgba(5,7,11,.78); backdrop-filter: blur(8px); }

<script>
// WC2026_GAME1_KNOCKOUT_CHOICE_RESOLUTION_TESTS



// Browser-run test harness for knockout winner choice menus.
// It verifies that a tapped R16/QF/SF slot can resolve exactly two contestants
// from the match path that feeds that slot. It is intentionally non-visual.
(function installKnockoutChoiceResolutionTests(){
  if (window.WC2026_GAME1_KNOCKOUT_CHOICE_RESOLUTION_TESTS) return;

  function normalizeSlotId(slotId) {
    return String(slotId || "").trim().toUpperCase().replace(/_/g, "-");
  }

  function slotOrdinal(slotId, round) {
    const normalized = normalizeSlotId(slotId);
    const match = normalized.match(new RegExp("^" + round + "[- ]?(\\d+)$"));
    return match ? Number(match[1]) : null;
  }

  function knockoutFeederSlotsFor(slotId) {
    const normalized = normalizeSlotId(slotId);
    let n;
    if ((n = slotOrdinal(normalized, "R16"))) return [`R32-${(n * 2) - 1}`, `R32-${n * 2}`];
    if ((n = slotOrdinal(normalized, "QF"))) return [`R16-${(n * 2) - 1}`, `R16-${n * 2}`];
    if ((n = slotOrdinal(normalized, "SF"))) return [`QF-${(n * 2) - 1}`, `QF-${n * 2}`];
    return [];
  }

  function allPossibleSlotKeys(slotId) {
    const normalized = normalizeSlotId(slotId);
    const compact = normalized.replace("-", "");
    const lower = normalized.toLowerCase();
    const lowerCompact = compact.toLowerCase();
    return [normalized, compact, lower, lowerCompact];
  }

  function readTeamForSlot(slotId) {
    const stores = [
      window.game1R32Picks,
      window.GAME1_R32_PICKS,
      window.r32Picks,
      window.R32_PICKS,
      window.game1KnockoutPicks,
      window.GAME1_KNOCKOUT_PICKS,
      window.knockoutPicks,
      window.KNOCKOUT_PICKS,
    ].filter(Boolean);

    for (const store of stores) {
      for (const key of allPossibleSlotKeys(slotId)) {
        if (store && Object.prototype.hasOwnProperty.call(store, key) && store[key]) return store[key];
      }
    }

    const selectors = allPossibleSlotKeys(slotId).flatMap(key => [
      `[data-slot-id="${key}"]`,
      `[data-slot="${key}"]`,
      `[data-logical-id="${key}"]`,
    ]);
    for (const selector of selectors) {
      const el = document.querySelector(selector);
      if (!el) continue;
      const teamId = el.getAttribute("data-team-id") || el.getAttribute("data-team") || el.dataset.teamId || el.dataset.team;
      const name = el.getAttribute("data-team-name") || el.dataset.teamName || el.querySelector(".teamName")?.textContent?.trim() || el.textContent?.trim();
      if (teamId || name) return { id: teamId || name, name: name || teamId, sourceSlotId: slotId };
    }

    return null;
  }

  function resolveKnockoutChoiceContestants(slotId) {
    const feeders = knockoutFeederSlotsFor(slotId);
    const contestants = feeders.map(readTeamForSlot).filter(Boolean);
    return { slotId: normalizeSlotId(slotId), feeders, contestants };
  }

  function testKnockoutChoiceResolution(slotId) {
    const result = resolveKnockoutChoiceContestants(slotId);
    if (result.feeders.length !== 2) {
      throw new Error(`No knockout feeder mapping for ${slotId}`);
    }
    if (result.contestants.length !== 2) {
      throw new Error(`Expected exactly two knockout choice contestants for ${slotId}; found ${result.contestants.length}. Feeders: ${result.feeders.join(", ")}`);
    }
    return result;
  }

  function testSeededFixture() {
    const previous = {
      game1R32Picks: window.game1R32Picks,
      game1KnockoutPicks: window.game1KnockoutPicks,
    };
    try {
      window.game1R32Picks = Object.assign({}, window.game1R32Picks || {}, {
        "R32-1": { id: "CAN", name: "Canada", abbr: "CAN", group: "B" },
        "R32-2": { id: "QAT", name: "Qatar", abbr: "QAT", group: "B" },
      });
      const r16 = testKnockoutChoiceResolution("R16-1");
      if (r16.contestants.length === 2) return r16;
      throw new Error("Seeded R16 fixture returned an empty choice set");
    } finally {
      window.game1R32Picks = previous.game1R32Picks;
      window.game1KnockoutPicks = previous.game1KnockoutPicks;
    }
  }

  window.WC2026_GAME1_KNOCKOUT_CHOICE_RESOLUTION_TESTS = {
    knockoutFeederSlotsFor,
    resolveKnockoutChoiceContestants,
    testKnockoutChoiceResolution,
    testSeededFixture,
  };
})();
</script>

// WB_TOOLTIP_SIDE_PLACEMENT_START
(function(){
  const existing = document.getElementById('wb-side-tooltip');
  if (existing) return;

  const tooltip = document.createElement('div');
  tooltip.id = 'wb-side-tooltip';
  tooltip.className = 'wb-side-tooltip';
  tooltip.hidden = true;

  const bodyEl = tooltip.querySelector('.wb-side-tooltip-body');
  const actionEl = tooltip.querySelector('.wb-side-tooltip-action');

  let closeTimer = null;
  const GAP_BRIDGE = 20;

  function escText(v){
    return String(v == null ? '' : v);
  }

  function tooltipTextFor(el){
    if (!el) return '';
    return (
      el.getAttribute('data-tooltip') ||
      el.getAttribute('data-slot-tooltip') ||
      el.getAttribute('data-tip') ||
      el.getAttribute('aria-label') ||
      el.getAttribute('title') ||
      ''
    ).trim();
  }

  function tooltipTitleFor(el){
    return (
      el.getAttribute('data-tooltip-title') ||
      el.getAttribute('data-slot') ||
      el.getAttribute('data-slot-id') ||
      el.getAttribute('data-pick-id') ||
      ''
    ).trim();
  }

  function isCandidate(el){
    if (!el || el === document.body || el === document.documentElement) return false;
    if (tooltipTextFor(el)) return true;
    if (el.matches && el.matches('[data-slot-id], [data-slot], [data-pick-id], .pick, .pick-card, .slot, .slot-card, .bracket-slot, .r32-slot, .team-tile')) {
      return true;
    }
    return false;
  }

  function findCandidate(start){
    let el = start;
    while (el && el !== document.body && el !== document.documentElement) {
      if (isCandidate(el)) return el;
      el = el.parentElement;
    }
    return null;
  }

  function viewportPlacement(targetRect, tipRect){
    const margin = 12;
    const gap = 12;

    const canRight = targetRect.right + gap + tipRect.width <= window.innerWidth - margin;
    const canLeft = targetRect.left - gap - tipRect.width >= margin;

    let left;
    if (canRight) {
      left = targetRect.right + gap;
    } else if (canLeft) {
      left = targetRect.left - gap - tipRect.width;
    } else {
      left = Math.min(
        Math.max(margin, targetRect.left),
        window.innerWidth - margin - tipRect.width
      );
    }

    let top = targetRect.top + (targetRect.height - tipRect.height) / 2;
    top = Math.min(
      Math.max(margin, top),
      window.innerHeight - margin - tipRect.height
    );

    return {left, top};
  }

  function positionTooltip(){
    if (!activeTarget || tooltip.hidden) return;

    const targetRect = activeTarget.getBoundingClientRect();

    tooltip.style.left = '0px';
    tooltip.style.top = '0px';
    tooltip.hidden = false;
    const tipRect = tooltip.getBoundingClientRect();
    const pos = viewportPlacement(targetRect, tipRect);

    tooltip.style.top = Math.round(pos.top) + 'px';

  function openTooltip(target){
    const body = tooltipTextFor(target);
    const title = tooltipTitleFor(target);

    if (!body && !title) return;

    clearTimeout(closeTimer);

    if (activeTarget && activeTarget !== target) {
      activeTarget.classList.remove('wb-tooltip-anchor-active');
    }

    activeTarget = target;
    activeTarget.classList.add('wb-tooltip-anchor-active');

    // Prevent native title tooltip from competing with side tooltip.
    if (target.hasAttribute('title')) {

      target.removeAttribute('title');
    }

    titleEl.textContent = escText(title || 'Pick detail');
    bodyEl.textContent = escText(body || title || '');

    const actionHref = target.getAttribute('data-tooltip-action-href');
    const actionLabel = target.getAttribute('data-tooltip-action-label') || 'Open';

      actionEl.textContent = actionLabel;
      actionEl.setAttribute('href', actionHref);
    } else {
      actionEl.hidden = true;
      actionEl.removeAttribute('href');
    }

    tooltip.hidden = false;
    tooltip.dataset.open = 'true';
    document.body.classList.add('wb-side-tooltip-open');
    positionTooltip();
  }

  function closeTooltipSoon(){
    clearTimeout(closeTimer);
    closeTimer = setTimeout(closeTooltip, 160);
  }

  function closeTooltip(){
    clearTimeout(closeTimer);

    if (activeTarget) {
      activeTarget.classList.remove('wb-tooltip-anchor-active');
      if (activeTarget.hasAttribute('data-wb-native-title')) {
        activeTarget.setAttribute('title', activeTarget.getAttribute('data-wb-native-title') || '');

      }
    }

    activeTarget = null;
    tooltip.dataset.open = 'false';
    document.body.classList.remove('wb-side-tooltip-open');
    tooltip.hidden = true;
  }

  function rectWithBridge(a, b){
    const left = Math.min(a.left, b.left) - GAP_BRIDGE;
    const right = Math.max(a.right, b.right) + GAP_BRIDGE;
    const top = Math.min(a.top, b.top) - GAP_BRIDGE;
    const bottom = Math.max(a.bottom, b.bottom) + GAP_BRIDGE;
    return {left, right, top, bottom};
  }

  function pointInside(rect, x, y){
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  document.addEventListener('focusin', function(e){
    if (tooltip.contains(e.target)) return;
    const target = findCandidate(e.target);

  document.addEventListener('pointermove', function(e){

  window.addEventListener('scroll', positionTooltip, true);
  window.addEventListener('resize', positionTooltip);

  tooltip.addEventListener('pointerenter', function(){

  });

})();

  }

  function writeJson(key, value){
    try { localStorage.setItem(key, JSON.stringify(value || {})); } catch {}
  }

  }

  }

  function normalizeSlotRule(rule){
    return rule && typeof rule === "object" ? rule : {};
  }

  function slotRuleFor(slotId){
    const id = String(slotId || "");
    if (!id) return null;
    try {
      const fromApi = api()?.slotById?.(id);
      if (fromApi) return normalizeSlotRule(fromApi);
    } catch {}

    const knownCollections = [
      window.game1R32SlotAssignmentRules,
      window.game1R32SlotMenuRules,
      window.game1KnockoutSlotRules,
      window.game1KnockoutChoiceRules,
      window.game1R16ChoiceMenuRules,
      window.WC2026_GAME1_SLOT_RULES,
      window.WC2026_GAME1_R16_SLOT_RULES,
      window.WC2026_GAME1_ADVANCEMENT_SLOT_RULES
    ];

    for (const collection of knownCollections) {
      if (Array.isArray(collection)) {
        const match = collection.find((rule) => rule && (rule.slotId === id || rule.id === id));
        if (match) return normalizeSlotRule(match);
      }
      if (collection && typeof collection === "object") {
        const direct = collection[id];
        if (direct) return normalizeSlotRule(direct);
        const values = Object.values(collection);
        const match = values.find((rule) => rule && typeof rule === "object" && (rule.slotId === id || rule.id === id));
        if (match) return normalizeSlotRule(match);
      }
    }
    return null;
  }

  function inferRound(slotId, pick, rule){
    const explicit = pick?.round || rule?.round || rule?.targetRound || rule?.stage;
    if (explicit) return String(explicit).toUpperCase();
    const id = String(slotId || "").toUpperCase();
    if (id.includes("R32")) return "R32";
    if (id.includes("R16")) return "R16";
    if (id.includes("QF")) return "QF";
    if (id.includes("SF")) return "SF";
    if (id.includes("FINAL")) return "FINAL";
    if (id.includes("CHAMP")) return "CHAMPION";
    return "R32";
  }

  function teamIdentityFrom(raw){
    const pick = raw && typeof raw === "object" ? raw : { abbr: raw };
    const teamId = pick.teamId || pick.id || pick.team || pick.code || pick.abbr || pick.name || "";
    const abbr = pick.abbr || pick.code || pick.teamId || pick.id || pick.team || pick.name || "";
    const name = pick.name || pick.teamName || pick.label || pick.country || abbr || teamId || "";
    const flagEmoji = pick.flagEmoji || pick.flag || pick.emoji || "";
    return {
      teamId: String(teamId || ""),
      abbr: String(abbr || ""),
      name: String(name || ""),
      flagEmoji: String(flagEmoji || "")
    };
  }

  function flattenSlotIds(value){
    const out = [];
    function visit(item){
      if (!item) return;
      if (typeof item === "string") { out.push(item); return; }
      if (Array.isArray(item)) { item.forEach(visit); return; }
      if (typeof item === "object") {
        const direct = item.slotId || item.sourceSlotId || item.fromSlotId || item.id;
        if (typeof direct === "string") out.push(direct);
      }
    }
    visit(value);
    return out;

  function getSourceSlotIds(slotId){
    const id = String(slotId || "");
    const rule = slotRuleFor(id) || {};
    const pick = getPick(id) || {};

      pick.sourceSlotIds,
      rule.sourceSlotIds,
      rule.feederSlotIds,
      rule.fromSlotIds,
      rule.inputSlotIds,
      rule.candidateSlotIds,
      rule.sources,
      rule.sourceSlots,
      rule.children,
      rule.homeSlotId,
      rule.awaySlotId,
      rule.leftSlotId,
      rule.rightSlotId,
      rule.sourceA,
      rule.sourceB,
      rule.fromA,
      rule.fromB
    ];
    const ids = [];
    candidates.forEach((candidate) => flattenSlotIds(candidate).forEach((sourceId) => ids.push(sourceId)));

  }

  function normalizePick(slotId, raw, fallbackRule){
    if (!slotId || !raw) return null;
    const source = raw && typeof raw === "object" ? raw : { abbr: raw };

    const team = teamIdentityFrom(source);
    if (!team.teamId && !team.abbr && !team.name) return null;
    const round = inferRound(slotId, source, rule);
    const explicitSources = flattenSlotIds(source.sourceSlotIds);
    const ruleSources = explicitSources.length ? explicitSources : getSourceSlotIds(slotId);
    return {
      slotId: String(slotId),
      round,
      teamId: team.teamId || team.abbr || team.name,
      abbr: team.abbr || team.teamId || team.name,
      name: team.name || team.abbr || team.teamId,
      flagEmoji: team.flagEmoji,
      sourceSlotIds: Array.from(new Set(ruleSources.map(String).filter(Boolean))),
      pickedAt: source.pickedAt || source.updatedAt || nowIso(),
      storeContract: MODEL_CONTRACT
    };
  }

  function extractPickMap(value){
    if (!value || typeof value !== "object") return {};
    if (value.picksBySlotId && typeof value.picksBySlotId === "object") return value.picksBySlotId;
    if (value.picks && typeof value.picks === "object") return value.picks;
    return value;
  }

  function load(){
    const canonicalRaw = extractPickMap(readJson(MODEL_KEY));
    const merged = {};

    // Canonical wins. Legacy stores are migration inputs only.
    Object.entries(canonicalRaw || {}).forEach(([slotId, raw]) => {
      const pick = normalizePick(slotId, raw);
      if (pick) merged[slotId] = pick;
    });

    MIRROR_KEYS.forEach((key) => {
      const legacy = extractPickMap(readJson(key));
      Object.entries(legacy || {}).forEach(([slotId, raw]) => {
        if (merged[slotId]) return;
        const pick = normalizePick(slotId, raw);
        if (pick) merged[slotId] = pick;
      });
    });

    return {
      version: MODEL_CONTRACT,
      storageKey: MODEL_KEY,
      picksBySlotId: merged,
      updatedAt: nowIso()
    };
  }

  function save(nextState){
    const source = nextState && typeof nextState === "object" ? nextState : { picksBySlotId: {} };
    const sourcePicks = extractPickMap(source);
    const normalized = {};
    Object.entries(sourcePicks || {}).forEach(([slotId, raw]) => {
      const pick = normalizePick(slotId, raw);
      if (pick) normalized[slotId] = pick;
    });
    const saved = {
      version: MODEL_CONTRACT,
      storageKey: MODEL_KEY,
      picksBySlotId: normalized,
      updatedAt: nowIso()
    };
    writeJson(MODEL_KEY, saved.picksBySlotId);
    return saved;
  }

  function getPick(slotId){
    const state = load();
    return state.picksBySlotId[String(slotId || "")] || null;
  }

  function setPick(slotId, team, rule){
    const id = String(slotId || team?.slotId || rule?.slotId || "");
    if (!id) return null;
    const state = load();
    const pick = normalizePick(id, Object.assign({}, team || {}, { slotId: id }), rule || slotRuleFor(id));
    if (!pick) return null;
    state.picksBySlotId[id] = pick;
    save(state);
    try { api()?.set?.(id, pick); } catch {}
    return pick;
  }

  function clearPick(slotId){
    const id = String(slotId || "");
    if (!id) return false;
    const state = load();
    delete state.picksBySlotId[id];
    save(state);
    try { api()?.clear?.(id); } catch {}
    try { delete window.picks?.[id]; } catch {}
    try { delete window.r16Picks?.[id]; } catch {}
    try { delete window.advancementPicks?.[id]; } catch {}
    try { delete window.game1KnockoutPicks?.[id]; } catch {}
    return true;
  }

  function roundForSlot(slotId){
    const pick = getPick(slotId);
    const rule = slotRuleFor(slotId) || {};
    return inferRound(slotId, pick, rule);
  }

  function pickHasTeam(pick){
    return !!(pick && (pick.teamId || pick.abbr || pick.name));
  }

  function isPickValid(slotId, seen){
    const id = String(slotId || "");
    if (!id) return false;
    const guard = seen || new Set();
    if (guard.has(id)) return false;
    guard.add(id);

    const pick = getPick(id);
    if (!pickHasTeam(pick)) return false;

    const round = String(pick.round || roundForSlot(id) || "").toUpperCase();
    if (round === "R32") return true;

    const sources = pick.sourceSlotIds && pick.sourceSlotIds.length ? pick.sourceSlotIds : getSourceSlotIds(id);
    if (!sources.length) return false;
    return sources.every((sourceId) => isPickValid(sourceId, guard));
  }

  function isSlotPickable(slotId){
    const id = String(slotId || "");
    if (!id) return false;
    const round = String(roundForSlot(id) || "").toUpperCase();
    if (round === "R32") return true;
    const sources = getSourceSlotIds(id);
    if (!sources.length) return false;
    return sources.every((sourceId) => isPickValid(sourceId));
  }

  function getRenderablePicks(){
    const state = load();
    const renderable = {};
    Object.keys(state.picksBySlotId || {}).forEach((slotId) => {
      if (isPickValid(slotId)) renderable[slotId] = state.picksBySlotId[slotId];
    });
    return renderable;
  }

  function clear(){
    writeJson(MODEL_KEY, {});
    MIRROR_KEYS.forEach((key) => writeJson(key, {}));
    try { window.picks = {}; } catch {}
    try { window.r16Picks = {}; } catch {}
    try { window.advancementPicks = {}; } catch {}
    try { window.game1KnockoutPicks = {}; } catch {}
    try { api()?.replaceAll?.({}); } catch {}
    return load();
  }

  function inspect(){
    const state = load();
    return {
      contract: MODEL_CONTRACT,
      storageKey: MODEL_KEY,
      pickCount: Object.keys(state.picksBySlotId || {}).length,
      state,
      renderablePicks: getRenderablePicks(),
      mirrorKeys: MIRROR_KEYS.slice()
    };
  }

  window.WC2026_GAME1_PICK_STATE = {
    load,
    save,
    clear,
    getPick,
    setPick,
    clearPick,
    getSourceSlotIds,
    isPickValid,
    isSlotPickable,
    getRenderablePicks,
    inspect,
    storageKey: MODEL_KEY,
    contract: MODEL_CONTRACT
  };
})();
/* WC2026_GAME1_CANONICAL_PICK_STATE_MODEL_END */
</script>

(function installR32AssignAfterClearRepair(){
  const R32_KEY = "wc2026.game1.r32.picks";
  const BRACKET_KEY = "wc2026.game1.bracketPicks";

  function readJson(key){
    try { return JSON.parse(localStorage.getItem(key) || "{}"); }
    catch { return {}; }
  }

  function writeJson(key, value){
    localStorage.setItem(key, JSON.stringify(value || {}));
    return value || {};
  }

  function teamKey(pick){
    return String(pick?.abbr || pick?.code || pick?.teamCode || pick?.fifaCode || pick?.display || pick?.name || "")
      .trim()
      .toUpperCase();
  }

  function r32AliasSet(slotId){
    const id = String(slotId || "");
    const aliases = new Set([id]);

    let m = id.match(/^R32-([LR])-M(\d+)([AB])$/i);
    if (m) {
      const side = m[1].toUpperCase();
      const matchIndex = Number(m[2]);
      const sideOffset = m[3].toUpperCase() === "A" ? 1 : 2;
      aliases.add(`${side}-R32-${String(((matchIndex - 1) * 2) + sideOffset).padStart(2, "0")}`);
    }

    m = id.match(/^([LR])-R32-(\d+)$/i);
    if (m) {
      const side = m[1].toUpperCase();
      const n = Number(m[2]);
      const matchIndex = Math.floor((n + 1) / 2);
      const sideLetter = n % 2 === 1 ? "A" : "B";
      aliases.add(`R32-${side}-M${matchIndex}${sideLetter}`);
    }

    return Array.from(aliases);
  }

  function currentPickForAnyAlias(slotId){
    const r32 = readJson(R32_KEY);
    const bracket = readJson(BRACKET_KEY);
    for (const alias of r32AliasSet(slotId)) {
      if (r32[alias]) return r32[alias];
      if (bracket[alias]) return bracket[alias];
    }
    return null;
  }

  function ruleFromCurrentMenuOrActiveSlot(){
    if (activeSlot && activeSlot.slotId) return activeSlot;

    const slotId =
      menu?.dataset?.activeSlotId ||
      menu?.dataset?.assignmentTargetSlotId ||
      menu?.dataset?.assignmentSlotId ||
      "";

    if (!slotId) return null;

    return SLOT_RULES.find(rule =>
      rule.slotId === slotId ||
      rule.logicalId === slotId ||
      r32AliasSet(rule.slotId).includes(slotId)
    ) || null;
  }

  function storeR32PickForRule(rule, team){
    if (!rule?.slotId || !team) return null;

    const slotId = rule.slotId;
    const oldPick = currentPickForAnyAlias(slotId);

    const stored = Object.assign({}, team, {
      assignedSlotId: slotId,
      assignmentTargetSlotId: slotId,
      round: "R32",
      slotRule: rule.slotRule,
      slotRuleLong: rule.slotRuleLong,
      storeContract: "wc2026-game1-bracket-picks-v001",
      r32AssignmentState: "projection"
    });

    const r32 = readJson(R32_KEY);
    const bracket = readJson(BRACKET_KEY);

    // The manifest slot id is the render key. Alias keys are support keys for dependency checks.
    r32[slotId] = stored;
    bracket[slotId] = stored;

    r32AliasSet(slotId).forEach(alias => {
      bracket[alias] = Object.assign({}, stored, {
        assignedSlotId: alias,
        assignmentTargetSlotId: alias,
        renderSlotId: slotId
      });
    });

    writeJson(R32_KEY, r32);
    writeJson(BRACKET_KEY, bracket);

    if (typeof picks !== "undefined" && picks) {
      picks[slotId] = stored;
    }

    try {
      window.WC2026_GAME1_BRACKET_PICK_STORE_API?.set?.(slotId, stored);
    } catch {}

    const changed = !!oldPick && teamKey(oldPick) !== teamKey(stored);

    if (changed && typeof window.WC2026_CLEAR_DOWNSTREAM_OF_SLOT === "function") {
      window.WC2026_CLEAR_DOWNSTREAM_OF_SLOT(slotId, {reason: "r32-source-changed"});
    }

    return {slotId, stored, oldPick, changed};
  }

  const previousAssignTeam = typeof assignTeam === "function" ? assignTeam : null;

  assignTeam = function assignR32TeamAfterClearRepair(team){
    const rule = ruleFromCurrentMenuOrActiveSlot();

    if (!rule || !rule.slotId) {
      if (previousAssignTeam) return previousAssignTeam(team);
      return null;
    }

    const result = storeR32PickForRule(rule, team);

    if (typeof applyGame1ManifestR32GeometryToSlotRules === "function") {
      applyGame1ManifestR32GeometryToSlotRules();
    }

    if (typeof renderPicks === "function") renderPicks();
    if (typeof closeMenu === "function") closeMenu();

    const menuEl = document.querySelector(".tapMenu");
    if (menuEl) menuEl.classList.remove("isOpen");

    const backdropEl = document.querySelector(".backdrop");
    if (backdropEl) backdropEl.classList.remove("isOpen");

    return result;
  };

  window.WC2026_ASSIGN_R32_AFTER_CLEAR = storeR32PickForRule;
})();

// WC2026_BRACKET_PICK_FINALITY_VALIDATION_START
(function installBracketPickFinalityValidation(){
  const BRACKET_KEY = "wc2026.game1.bracketPicks";
  const R32_KEY = "wc2026.game1.r32.picks";
  const R16_KEY = "wc2026.game1.r16.winnerPicks";
  const QFSF_KEY = "wc2026.game1.qfSf.winnerPicks";

  function readJson(key){
    try { return JSON.parse(localStorage.getItem(key) || "{}"); }
    catch { return {}; }
  }

  function teamKey(pick){
    return String(
      pick?.abbr ||
      pick?.code ||
      pick?.teamCode ||
      pick?.fifaCode ||
      pick?.display ||
      pick?.displayName ||
      pick?.displayNameFromImage ||
      pick?.name ||
      ""
    ).trim().toUpperCase();
  }

  function isR32Slot(slotId){
    const id = String(slotId || "").toUpperCase();
    return id.includes("-R32-") || id.startsWith("R32-");
  }

  function canonicalR32SlotId(slotId){
    const id = String(slotId || "");
    let m = id.match(/^R32-([LR])-M(\d+)([AB])$/i);
    if (m) {
      const side = m[1].toUpperCase();
      const matchIndex = Number(m[2]);
      const sideOffset = m[3].toUpperCase() === "A" ? 1 : 2;
      return `${side}-R32-${String(((matchIndex - 1) * 2) + sideOffset).padStart(2, "0")}`;
    }
    m = id.match(/^([LR])-R32-(\d+)$/i);
    if (m) return `${m[1].toUpperCase()}-R32-${String(Number(m[2])).padStart(2, "0")}`;
    return id;
  }

  function manifestR32SlotId(slotId){
    const canonical = canonicalR32SlotId(slotId);
    const m = String(canonical || "").match(/^([LR])-R32-(\d+)$/i);
    if (!m) return slotId;
    const side = m[1].toUpperCase();
    const index = Number(m[2]);
    const matchIndex = Math.ceil(index / 2);
    const half = index % 2 === 1 ? "A" : "B";
    return `R32-${side}-M${matchIndex}${half}`;
  }

  function equivalentSlotIds(slotId){
    const ids = new Set();
    const id = String(slotId || "");
    if (!id) return [];
    ids.add(id);
    if (isR32Slot(id)) {
      const canonical = canonicalR32SlotId(id);
      ids.add(canonical);
      ids.add(manifestR32SlotId(canonical));
    }
    return Array.from(ids).filter(Boolean);
  }

  function allStores(){
    return {
      bracket: readJson(BRACKET_KEY),
      r32: readJson(R32_KEY),
      r16: readJson(R16_KEY),
      qfSf: readJson(QFSF_KEY)
    };
  }

  function pickForSlot(slotId){
    const stores = allStores();
    for (const id of equivalentSlotIds(slotId)) {
      if (stores.bracket[id]) return stores.bracket[id];
      if (stores.r32[id]) return stores.r32[id];
      if (stores.r16[id]) return stores.r16[id];
      if (stores.qfSf[id]) return stores.qfSf[id];
    }
    return null;
  }

  function apiSlot(slotId){
    try { return window.WC2026_GAME1_BRACKET_PICK_STORE_API?.slotById?.(slotId) || null; }
    catch { return null; }
  }

  function slotSources(slotId, pick){
    const meta = apiSlot(slotId);
    return Array.from(new Set([
      ...(meta?.sourceSlotIds || []),
      ...(pick?.sourceSlotIds || []),
      ...(pick?.sourceR32SlotIds || [])
    ].filter(Boolean)));
  }

  function storedEntries(){
    const stores = allStores();
    const merged = Object.assign({}, stores.bracket, stores.r32, stores.r16, stores.qfSf);
    return Object.entries(merged).map(([slotId, pick]) => ({slotId, pick}));
  }

  function independentR32TeamLocations(){
    const locations = {};
    storedEntries().forEach(({slotId, pick}) => {
      if (!isR32Slot(slotId)) return;
      const key = teamKey(pick);
      if (!key) return;
      const canonical = canonicalR32SlotId(slotId);
      if (!locations[key]) locations[key] = new Set();
      locations[key].add(canonical);
    });
    return Object.fromEntries(Object.entries(locations).map(([key, set]) => [key, Array.from(set)]));
  }

  function sourceExists(sourceSlotId){
    return !!pickForSlot(sourceSlotId);
  }

  function directSourceHasTeam(slotId, pick){
    const sources = slotSources(slotId, pick);
    if (!sources.length) return true;
    const key = teamKey(pick);
    if (!key) return false;
    return sources.some(source => teamKey(pickForSlot(source)) === key);
  }

  function validateBracketPickFinality(slotId){
    const pick = pickForSlot(slotId);
    const reasons = [];
    const warnings = [];

    if (!slotId) {
      return {slotId, canRemainFinal:false, state:"invalid-missing-slot", reasons:["Missing slot id"], warnings:[]};
    }

    if (!pick) {
      return {slotId, canRemainFinal:false, state:"empty", reasons:["No stored pick for slot"], warnings:[]};
    }

    const key = teamKey(pick);
    if (!key) reasons.push("Stored pick has no team key");

    const r32Locations = independentR32TeamLocations();
    const duplicateLocations = key ? (r32Locations[key] || []) : [];
    if (duplicateLocations.length > 1) {
      reasons.push(`Team ${key} appears in multiple independent R32 source slots: ${duplicateLocations.join(", ")}`);
    }

    const sources = slotSources(slotId, pick);
    const missingSources = sources.filter(source => !sourceExists(source));
    if (missingSources.length) {
      reasons.push(`Missing upstream source pick(s): ${missingSources.join(", ")}`);
    }

    if (!isR32Slot(slotId) && sources.length && !directSourceHasTeam(slotId, pick)) {
      reasons.push(`Team ${key || "unknown"} is not reachable from this slot's immediate feeder picks`);
    }

    if (isR32Slot(slotId)) {
      const canonical = canonicalR32SlotId(slotId);
      const storedSlot = String(pick.assignedSlotId || pick.assignmentTargetSlotId || slotId);
      if (isR32Slot(storedSlot) && canonicalR32SlotId(storedSlot) !== canonical) {
        warnings.push(`Pick assignment target ${storedSlot} differs from rendered slot ${slotId}`);
      }
    }

    const canRemainFinal = reasons.length === 0;
    const state = canRemainFinal ? "finalizable" : "invalid-finality";

    return {
      slotId,
      teamKey: key,
      team: pick.display || pick.displayName || pick.displayNameFromImage || pick.name || pick.abbr || key,
      canRemainFinal,
      state,
      reasons,
      warnings,
      sourceSlotIds: sources,
      duplicateR32Locations: duplicateLocations
    };
  }

  function validateAllBracketPickFinality(){
    const seen = new Set();
    const results = [];
    storedEntries().forEach(({slotId}) => {
      if (seen.has(slotId)) return;
      seen.add(slotId);
      results.push(validateBracketPickFinality(slotId));
    });
    return results;
  }

  function markBracketPickFinality(root){
    const scope = root || document;
    scope.querySelectorAll?.(".pickCard")?.forEach(card => {
      const slotId = card.dataset.slotId || card.dataset.assignmentTargetSlotId || "";
      const result = validateBracketPickFinality(slotId);
      card.dataset.choiceCanRemainFinal = result.canRemainFinal ? "true" : "false";
      card.dataset.choiceCanBeFinal = result.canRemainFinal ? "true" : "false";
      card.dataset.choiceState = result.state;
      card.dataset.choiceFinalityReason = result.reasons.join(" | ");
      card.dataset.choiceFinalityTeam = result.teamKey || "";
    });
  }

  const previousRenderPicks = typeof renderPicks === "function" ? renderPicks : null;
  if (previousRenderPicks && !window.WC2026_BRACKET_PICK_FINALITY_RENDER_PATCHED) {
    renderPicks = function renderPicksWithBracketPickFinalityValidation(){
      const result = previousRenderPicks();
      markBracketPickFinality();
      return result;
    };
    window.WC2026_BRACKET_PICK_FINALITY_RENDER_PATCHED = true;
  }

  window.WC2026_VALIDATE_BRACKET_PICK_FINALITY = validateBracketPickFinality;
  window.WC2026_VALIDATE_ALL_BRACKET_PICK_FINALITY = validateAllBracketPickFinality;
  window.WC2026_MARK_BRACKET_PICK_FINALITY = markBracketPickFinality;

  setTimeout(markBracketPickFinality, 150);
})();

      displayName: team?.displayName || label,
      display: team?.display || label,

      code: team?.code || abbr,

      flagEmoji: team?.flagEmoji || team?.flag || "⚽",

      assignmentTargetSlotId: slotId,
      round,
      sourceSlotIds: rule?.sourceSlotIds || team?.sourceSlotIds || [],

      const matchIndex = Number(m[2]);
      const offset = m[3].toUpperCase() === "A" ? 1 : 2;
      ids.add(`${side}-R32-${String(((matchIndex - 1) * 2) + offset).padStart(2, "0")}`);
    }
    m = id.match(/^([LR])-R32-(\d+)$/i);

    return (target && target.closest && target.closest(BOARD_SELECTOR)) || document.querySelector(BOARD_SELECTOR) || document.body;
  }

  function boardPointForRect(rect, board) {
    const boardRect = board.getBoundingClientRect();
    const scrollLeft = board === document.body ? window.scrollX : board.scrollLeft;
    const scrollTop = board === document.body ? window.scrollY : board.scrollTop;
    return {
      left: rect.left - boardRect.left + scrollLeft,
      right: rect.right - boardRect.left + scrollLeft,
      top: rect.top - boardRect.top + scrollTop,
      bottom: rect.bottom - boardRect.top + scrollTop,
      midY: rect.top - boardRect.top + scrollTop + rect.height / 2

  function attachMenuToBoard(menu, board) {
    if (!menu || !board) return;
    if (menu.parentElement === board) return;
    const menuRect = menu.getBoundingClientRect();
    const p = boardPointForRect(menuRect, board);
    board.appendChild(menu);
    menu.style.position = "absolute";
    menu.style.left = `${Math.round(p.left)}px`;
    menu.style.top = `${Math.round(p.top)}px`;
  }

  function anchorMenuToTarget(menu, target) {
    if (!menu || !target || !target.getBoundingClientRect) return;
    const board = findBoardFor(target);
    attachMenuToBoard(menu, board);

    const targetRect = target.getBoundingClientRect();
    const p = boardPointForRect(targetRect, board);
    const boardWidth = board === document.body ? window.innerWidth : board.clientWidth;
    const boardHeight = board === document.body ? window.innerHeight : board.clientHeight;
    const scrollLeft = board === document.body ? window.scrollX : board.scrollLeft;
    const scrollTop = board === document.body ? window.scrollY : board.scrollTop;

    const menuHeight = Math.max(menu.offsetHeight || menu.getBoundingClientRect().height || 120, 80);

    let left = p.right + GAP;
    const visibleRight = scrollLeft + boardWidth - GAP;
    if (left + menuWidth > visibleRight) {

    }
    if (left < scrollLeft + GAP) {
      left = Math.min(p.right + GAP, visibleRight - menuWidth);

    let top = p.midY - menuHeight / 2;
    const visibleTop = scrollTop + GAP;
    const visibleBottom = scrollTop + boardHeight - GAP;
    if (top < visibleTop) top = visibleTop;
    if (top + menuHeight > visibleBottom) top = Math.max(visibleTop, visibleBottom - menuHeight);

    menu.style.left = `${Math.round(left)}px`;
    menu.style.top = `${Math.round(top)}px`;
    menu.style.right = "auto";
    menu.style.bottom = "auto";
  }

  function openMenus() {
    return Array.from(document.querySelectorAll(MENU_SELECTOR)).filter(isOpenMenu);
  }

  function anchorOpenMenus(target) {
    const anchorTarget = target || lastPickTarget;
    if (!anchorTarget || !document.contains(anchorTarget)) return;

  function rememberAnchorFromEvent(event) {
