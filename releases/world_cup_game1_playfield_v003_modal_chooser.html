<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>World Cup 2026 Game 1 - Pick the Round of 32</title>
<style>
:root{--bg:#07111f;--ink:#f8fbff;--muted:#b7c4d8;--accent:#78caff;--panel:#0a1728;--line:#31577a;--good:#46d27c;--danger:#ce314b}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 40% 0%,#132943 0,var(--bg) 50%,#030812 100%)}
header{padding:14px 18px 9px;border-bottom:1px solid #203b57}h1{margin:0;font-size:24px}.sub{color:var(--muted);margin-top:4px;font-size:14px}
.controls{display:flex;gap:8px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid #203b57}
button,input{font:inherit}button{border:1px solid #35638f;color:var(--ink);background:#143250;border-radius:10px;padding:8px 11px;cursor:pointer}button:hover{border-color:var(--accent)}input{background:#0b1a2d;border:1px solid #31577a;color:var(--ink);border-radius:10px;padding:8px 11px}
.main{padding:12px}.playfieldPanel{background:rgba(9,20,35,.88);border:1px solid #254a6f;border-radius:18px;padding:12px}.status{display:flex;justify-content:space-between;color:var(--muted);font-weight:800;margin:0 0 10px}
.playfieldWrap{position:relative;width:100%;max-width:1536px;margin:0 auto;border-radius:14px;overflow:hidden;border:1px solid #254a6f;background:#06101c}.playfieldWrap img{display:block;width:100%;height:auto}
.hotspot{position:absolute;border:2px solid rgba(255,255,255,.28);background:rgba(0,0,0,.02);border-radius:7px;padding:0;cursor:pointer}
.hotspot:hover,.hotspot.active{border-color:#ffe34d;background:rgba(255,227,77,.18);box-shadow:0 0 0 2px rgba(255,227,77,.14)}.hotspot .rule{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;color:#ffe34d;font-size:12px;line-height:1;text-align:center;padding:2px;text-shadow:0 1px 2px #000}.hotspot.picked .rule{display:none}.hotspot .flag{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:27px}
.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}.modalBackdrop.open{display:flex}.modal{width:min(430px,94vw);max-height:88vh;overflow:auto;background:linear-gradient(180deg,#10243d,#071423);border:1px solid #4a739c;border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.55);padding:16px}.modalHead{display:flex;justify-content:space-between;align-items:center;gap:10px}.modal h2{margin:0;font-size:20px}.closeBtn{font-size:22px;line-height:1;padding:5px 10px;background:#0a1728}.ruleBig{font-size:30px;color:#ffe34d;font-weight:950;margin-top:12px}.long{color:var(--muted);margin-top:4px}.choiceGrid{display:grid;gap:8px;margin-top:12px}.choice{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#102844}.choice .flag{font-size:24px;width:30px}.choice .name{font-weight:850}.choice .meta{color:var(--muted);font-size:12px;margin-left:auto}.choice.selected{outline:2px solid var(--good);border-color:var(--good)}.modalActions{display:flex;gap:8px;margin-top:12px}.danger{background:#592234;border-color:#b44963}.small{color:var(--muted);font-size:12px;line-height:1.35}
textarea{width:100%;min-height:120px;background:#06101c;color:var(--ink);border:1px solid #31577a;border-radius:12px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;margin-top:10px}
</style>
</head>
<body>
<header><h1>World Cup 2026 Game 1 - Pick the Round of 32</h1><div class="sub">Tap a Round-of-32 slot. A chooser window opens with the allowed group choices.</div></header>
<div class="controls"><input id="playerName" placeholder="Player name"/><button id="exportBtn">Export picks JSON</button><button id="importBtn">Import picks JSON</button><button id="clearBtn">Clear all picks</button></div>
<main class="main"><section class="playfieldPanel"><div class="status"><span id="pickedCount">0 / 32 picked</span><span>Tap a numbered Round-of-32 cell</span></div><div class="playfieldWrap" id="playfield"><img src="assets/playfield/r32_usa_single_frame_playfield.jpeg" alt="32-team knockout bracket playfield"/></div></section></main>
<div class="modalBackdrop" id="modalBackdrop"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modalHead"><h2 id="modalTitle">Choose team</h2><button class="closeBtn" id="closeModal" aria-label="Close">×</button></div><div id="slotInfo"></div><div class="choiceGrid" id="choices"></div><div class="modalActions"><button class="danger" id="deletePick">Delete this pick</button></div><p class="small">Picks are saved in this browser and can also be exported as JSON.</p><textarea id="jsonBox" placeholder="Export/import JSON appears here."></textarea></div></div>
<script>
const GROUPS = {"A": [{"name": "Mexico", "display": "Mexico", "abbr": "MEX", "flag": "🇲🇽"}, {"name": "South Africa", "display": "South Africa", "abbr": "RSA", "flag": "🇿🇦"}, {"name": "Korea Republic", "display": "South Korea", "abbr": "KOR", "flag": "🇰🇷"}, {"name": "Czechia", "display": "Czechia", "abbr": "CZE", "flag": "🇨🇿"}], "B": [{"name": "Canada", "display": "Canada", "abbr": "CAN", "flag": "🇨🇦"}, {"name": "Bosnia-Herzegovina", "display": "Bosnia-Herzegovina", "abbr": "BIH", "flag": "🇧🇦"}, {"name": "Qatar", "display": "Qatar", "abbr": "QAT", "flag": "🇶🇦"}, {"name": "Switzerland", "display": "Switzerland", "abbr": "SUI", "flag": "🇨🇭"}], "C": [{"name": "Brazil", "display": "Brazil", "abbr": "BRA", "flag": "🇧🇷"}, {"name": "Morocco", "display": "Morocco", "abbr": "MAR", "flag": "🇲🇦"}, {"name": "Haiti", "display": "Haiti", "abbr": "HAI", "flag": "🇭🇹"}, {"name": "Scotland", "display": "Scotland", "abbr": "SCO", "flag": "🏴"}], "D": [{"name": "USA", "display": "USA", "abbr": "USA", "flag": "🇺🇸"}, {"name": "Paraguay", "display": "Paraguay", "abbr": "PAR", "flag": "🇵🇾"}, {"name": "Australia", "display": "Australia", "abbr": "AUS", "flag": "🇦🇺"}, {"name": "Türkiye", "display": "Turkiye", "abbr": "TUR", "flag": "🇹🇷"}], "E": [{"name": "Germany", "display": "Germany", "abbr": "GER", "flag": "🇩🇪"}, {"name": "Curaçao", "display": "Curacao", "abbr": "CUW", "flag": "🇨🇼"}, {"name": "Côte d’Ivoire", "display": "Ivory Coast", "abbr": "CIV", "flag": "🇨🇮"}, {"name": "Ecuador", "display": "Ecuador", "abbr": "ECU", "flag": "🇪🇨"}], "F": [{"name": "Netherlands", "display": "Netherlands", "abbr": "NED", "flag": "🇳🇱"}, {"name": "Japan", "display": "Japan", "abbr": "JPN", "flag": "🇯🇵"}, {"name": "Sweden", "display": "Sweden", "abbr": "SWE", "flag": "🇸🇪"}, {"name": "Tunisia", "display": "Tunisia", "abbr": "TUN", "flag": "🇹🇳"}], "G": [{"name": "Belgium", "display": "Belgium", "abbr": "BEL", "flag": "🇧🇪"}, {"name": "Egypt", "display": "Egypt", "abbr": "EGY", "flag": "🇪🇬"}, {"name": "IR Iran", "display": "Iran", "abbr": "IRN", "flag": "🇮🇷"}, {"name": "New Zealand", "display": "New Zealand", "abbr": "NZL", "flag": "🇳🇿"}], "H": [{"name": "Spain", "display": "Spain", "abbr": "ESP", "flag": "🇪🇸"}, {"name": "Cabo Verde", "display": "Cape Verde", "abbr": "CPV", "flag": "🇨🇻"}, {"name": "Saudi Arabia", "display": "Saudi Arabia", "abbr": "KSA", "flag": "🇸🇦"}, {"name": "Uruguay", "display": "Uruguay", "abbr": "URU", "flag": "🇺🇾"}], "I": [{"name": "France", "display": "France", "abbr": "FRA", "flag": "🇫🇷"}, {"name": "Senegal", "display": "Senegal", "abbr": "SEN", "flag": "🇸🇳"}, {"name": "Iraq", "display": "Iraq", "abbr": "IRQ", "flag": "🇮🇶"}, {"name": "Norway", "display": "Norway", "abbr": "NOR", "flag": "🇳🇴"}], "J": [{"name": "Argentina", "display": "Argentina", "abbr": "ARG", "flag": "🇦🇷"}, {"name": "Algeria", "display": "Algeria", "abbr": "ALG", "flag": "🇩🇿"}, {"name": "Austria", "display": "Austria", "abbr": "AUT", "flag": "🇦🇹"}, {"name": "Jordan", "display": "Jordan", "abbr": "JOR", "flag": "🇯🇴"}], "K": [{"name": "Portugal", "display": "Portugal", "abbr": "POR", "flag": "🇵🇹"}, {"name": "Congo DR", "display": "DR Congo", "abbr": "COD", "flag": "🇨🇩"}, {"name": "Uzbekistan", "display": "Uzbekistan", "abbr": "UZB", "flag": "🇺🇿"}, {"name": "Colombia", "display": "Colombia", "abbr": "COL", "flag": "🇨🇴"}], "L": [{"name": "England", "display": "England", "abbr": "ENG", "flag": "🏴"}, {"name": "Croatia", "display": "Croatia", "abbr": "CRO", "flag": "🇭🇷"}, {"name": "Ghana", "display": "Ghana", "abbr": "GHA", "flag": "🇬🇭"}, {"name": "Panama", "display": "Panama", "abbr": "PAN", "flag": "🇵🇦"}]};
const SLOT_RULES = {"R32-L-M1A": {"match": 73, "short": "2A", "long": "Runner-up Group A"}, "R32-L-M1B": {"match": 73, "short": "2B", "long": "Runner-up Group B"}, "R32-L-M2A": {"match": 75, "short": "1F", "long": "Winner Group F"}, "R32-L-M2B": {"match": 75, "short": "2C", "long": "Runner-up Group C"}, "R32-L-M3A": {"match": 74, "short": "1E", "long": "Winner Group E"}, "R32-L-M3B": {"match": 74, "short": "3 A/B/C/D/F", "long": "Best third-place team from Groups A/B/C/D/F"}, "R32-L-M4A": {"match": 77, "short": "1I", "long": "Winner Group I"}, "R32-L-M4B": {"match": 77, "short": "3 C/D/F/G/H", "long": "Best third-place team from Groups C/D/F/G/H"}, "R32-L-M5A": {"match": 76, "short": "1C", "long": "Winner Group C"}, "R32-L-M5B": {"match": 76, "short": "2F", "long": "Runner-up Group F"}, "R32-L-M6A": {"match": 78, "short": "2E", "long": "Runner-up Group E"}, "R32-L-M6B": {"match": 78, "short": "2I", "long": "Runner-up Group I"}, "R32-L-M7A": {"match": 79, "short": "1A", "long": "Winner Group A"}, "R32-L-M7B": {"match": 79, "short": "3 C/E/F/H/I", "long": "Best third-place team from Groups C/E/F/H/I"}, "R32-L-M8A": {"match": 80, "short": "1L", "long": "Winner Group L"}, "R32-L-M8B": {"match": 80, "short": "3 E/H/I/J/K", "long": "Best third-place team from Groups E/H/I/J/K"}, "R32-R-M1A": {"match": 83, "short": "2K", "long": "Runner-up Group K"}, "R32-R-M1B": {"match": 83, "short": "2L", "long": "Runner-up Group L"}, "R32-R-M2A": {"match": 84, "short": "1H", "long": "Winner Group H"}, "R32-R-M2B": {"match": 84, "short": "2J", "long": "Runner-up Group J"}, "R32-R-M3A": {"match": 81, "short": "1D", "long": "Winner Group D"}, "R32-R-M3B": {"match": 81, "short": "3 B/E/F/I/J", "long": "Best third-place team from Groups B/E/F/I/J"}, "R32-R-M4A": {"match": 82, "short": "1G", "long": "Winner Group G"}, "R32-R-M4B": {"match": 82, "short": "3 A/E/H/I/J", "long": "Best third-place team from Groups A/E/H/I/J"}, "R32-R-M5A": {"match": 86, "short": "1J", "long": "Winner Group J"}, "R32-R-M5B": {"match": 86, "short": "2H", "long": "Runner-up Group H"}, "R32-R-M6A": {"match": 88, "short": "2D", "long": "Runner-up Group D"}, "R32-R-M6B": {"match": 88, "short": "2G", "long": "Runner-up Group G"}, "R32-R-M7A": {"match": 85, "short": "1B", "long": "Winner Group B"}, "R32-R-M7B": {"match": 85, "short": "3 E/F/G/I/J", "long": "Best third-place team from Groups E/F/G/I/J"}, "R32-R-M8A": {"match": 87, "short": "1K", "long": "Winner Group K"}, "R32-R-M8B": {"match": 87, "short": "3 D/E/I/J/L", "long": "Best third-place team from Groups D/E/I/J/L"}};
const HOTSPOTS = [["R32-L-M1A", 2.0, 12.8, 9.0, 3.3], ["R32-L-M1B", 2.0, 16.4, 9.0, 3.3], ["R32-L-M2A", 2.0, 21.3, 9.0, 3.3], ["R32-L-M2B", 2.0, 25.0, 9.0, 3.3], ["R32-L-M3A", 2.0, 30.0, 9.0, 3.3], ["R32-L-M3B", 2.0, 33.7, 9.0, 3.3], ["R32-L-M4A", 2.0, 38.6, 9.0, 3.3], ["R32-L-M4B", 2.0, 42.3, 9.0, 3.3], ["R32-L-M5A", 2.0, 48.2, 9.0, 3.3], ["R32-L-M5B", 2.0, 52.0, 9.0, 3.3], ["R32-L-M6A", 2.0, 56.9, 9.0, 3.3], ["R32-L-M6B", 2.0, 60.7, 9.0, 3.3], ["R32-L-M7A", 2.0, 65.6, 9.0, 3.3], ["R32-L-M7B", 2.0, 69.4, 9.0, 3.3], ["R32-L-M8A", 2.0, 74.3, 9.0, 3.3], ["R32-L-M8B", 2.0, 78.1, 9.0, 3.3], ["R32-R-M1A", 88.8, 12.8, 9.0, 3.3], ["R32-R-M1B", 88.8, 16.4, 9.0, 3.3], ["R32-R-M2A", 88.8, 21.3, 9.0, 3.3], ["R32-R-M2B", 88.8, 25.0, 9.0, 3.3], ["R32-R-M3A", 88.8, 30.0, 9.0, 3.3], ["R32-R-M3B", 88.8, 33.7, 9.0, 3.3], ["R32-R-M4A", 88.8, 38.6, 9.0, 3.3], ["R32-R-M4B", 88.8, 42.3, 9.0, 3.3], ["R32-R-M5A", 88.8, 48.2, 9.0, 3.3], ["R32-R-M5B", 88.8, 52.0, 9.0, 3.3], ["R32-R-M6A", 88.8, 56.9, 9.0, 3.3], ["R32-R-M6B", 88.8, 60.7, 9.0, 3.3], ["R32-R-M7A", 88.8, 65.6, 9.0, 3.3], ["R32-R-M7B", 88.8, 69.4, 9.0, 3.3], ["R32-R-M8A", 88.8, 74.3, 9.0, 3.3], ["R32-R-M8B", 88.8, 78.1, 9.0, 3.3]];
const STORAGE_KEY = "wc2026.game1.playfield.picks.v1";
let state={version:"game1-modal-playfield-v1",playerName:"",picks:{}};let activeSlot=null;
function loadState(){try{const saved=localStorage.getItem(STORAGE_KEY);if(saved)state=JSON.parse(saved)}catch(e){}document.getElementById("playerName").value=state.playerName||""}
function saveState(){state.playerName=document.getElementById("playerName").value||"";localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function groupsForRule(short){if(!short)return[];if((short[0]==="1"||short[0]==="2")&&short.length>=2)return[short[1]];if(short.startsWith("3"))return[...short.matchAll(/[A-L]/g)].map(m=>m[0]);return[]}
function teamsForSlot(slotId){const rule=SLOT_RULES[slotId];if(!rule)return[];return groupsForRule(rule.short).flatMap(g=>(GROUPS[g]||[]).map(t=>({...t,group:g})))}
function makeHotspots(){const pf=document.getElementById("playfield");HOTSPOTS.forEach(([id,x,y,w,h])=>{const rule=SLOT_RULES[id];const b=document.createElement("button");b.className="hotspot";b.dataset.slot=id;b.style.left=x+"%";b.style.top=y+"%";b.style.width=w+"%";b.style.height=h+"%";b.title=rule?`Match ${rule.match}: ${rule.long}`:id;b.innerHTML=`<span class="rule">${rule?.short||""}</span>`;b.addEventListener("click",()=>openChooser(id));pf.appendChild(b)})}
function openChooser(slotId){activeSlot=slotId;const rule=SLOT_RULES[slotId];if(!rule)return;document.querySelectorAll(".hotspot").forEach(h=>h.classList.toggle("active",h.dataset.slot===slotId));const picked=state.picks[slotId];document.getElementById("slotInfo").innerHTML=`<div class="ruleBig">${rule.short}</div><div class="long">Match ${rule.match}: ${rule.long}</div><div class="small">Slot: ${slotId}${picked?" - Picked: "+picked.name:""}</div>`;const choices=document.getElementById("choices");choices.innerHTML="";teamsForSlot(slotId).forEach(t=>{const btn=document.createElement("button");btn.className="choice"+(picked?.abbr===t.abbr?" selected":"");btn.innerHTML=`<span class="flag">${t.flag}</span><span class="name">${t.display||t.name}</span><span class="meta">G${t.group}</span>`;btn.title=`${t.name} (${t.abbr}) - Group ${t.group}`;btn.addEventListener("click",()=>pickTeam(slotId,t));choices.appendChild(btn)});document.getElementById("deletePick").style.display=picked?"inline-block":"none";document.getElementById("modalBackdrop").classList.add("open")}
function closeChooser(){document.getElementById("modalBackdrop").classList.remove("open")}
function pickTeam(slotId,team){state.picks[slotId]={slotId,rule:SLOT_RULES[slotId],name:team.name,display:team.display||team.name,abbr:team.abbr,flag:team.flag,group:team.group};saveState();renderPicks();closeChooser()}
function deleteActivePick(){if(!activeSlot)return;delete state.picks[activeSlot];saveState();renderPicks();closeChooser()}
function renderPicks(){document.querySelectorAll(".hotspot").forEach(h=>{const pick=state.picks[h.dataset.slot];h.classList.toggle("picked",!!pick);h.innerHTML=pick?`<span class="flag">${pick.flag}</span><span class="rule">${SLOT_RULES[h.dataset.slot]?.short||""}</span>`:`<span class="rule">${SLOT_RULES[h.dataset.slot]?.short||""}</span>`;h.title=pick?`${pick.name} (${pick.abbr}) - ${SLOT_RULES[h.dataset.slot].long}`:`Match ${SLOT_RULES[h.dataset.slot]?.match}: ${SLOT_RULES[h.dataset.slot]?.long}`});document.getElementById("pickedCount").textContent=`${Object.keys(state.picks).length} / 32 picked`}
document.getElementById("playerName").addEventListener("input",()=>{saveState()});document.getElementById("closeModal").addEventListener("click",closeChooser);document.getElementById("modalBackdrop").addEventListener("click",e=>{if(e.target.id==="modalBackdrop")closeChooser()});document.getElementById("deletePick").addEventListener("click",deleteActivePick);
document.getElementById("exportBtn").addEventListener("click",()=>{saveState();document.getElementById("jsonBox").value=JSON.stringify(state,null,2);document.getElementById("modalBackdrop").classList.add("open")});
document.getElementById("importBtn").addEventListener("click",()=>{document.getElementById("modalBackdrop").classList.add("open");document.getElementById("jsonBox").focus()});
document.getElementById("jsonBox").addEventListener("change",()=>{const txt=document.getElementById("jsonBox").value.trim();if(!txt)return;try{state=JSON.parse(txt);saveState();renderPicks();document.getElementById("playerName").value=state.playerName||""}catch(e){alert("Could not import JSON: "+e.message)}});
document.getElementById("clearBtn").addEventListener("click",()=>{if(!confirm("Clear all Game 1 picks?"))return;state.picks={};saveState();renderPicks()});
loadState();makeHotspots();renderPicks();
</script>
</body></html>
