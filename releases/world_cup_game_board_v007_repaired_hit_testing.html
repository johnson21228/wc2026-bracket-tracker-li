<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>World Cup 2026 Game 1</title>
<style>
:root { --ink:#f8fbff; --muted:#b7c4d8; --accent:#ffe34d; }
* { box-sizing:border-box; }
body { margin:0; background:#030812; color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
header,.controls { background:#07111f; border-bottom:1px solid #203b57; padding:10px 16px; }
h1 { margin:0; font-size:22px; }
.sub { color:var(--muted); font-size:13px; margin-top:3px; }
.controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
button,input,select { font:inherit; }
button,select,input { border:1px solid #35638f; color:var(--ink); background:#143250; border-radius:10px; padding:8px 10px; }
input { background:#0b1a2d; }
.main { padding:12px; }
.panel { background:rgba(9,20,35,.88); border:1px solid #254a6f; border-radius:18px; padding:12px; }
.status { display:flex; justify-content:space-between; color:var(--muted); font-weight:800; margin-bottom:8px; }
.scroller { overflow:auto; max-height:calc(100vh - 152px); -webkit-overflow-scrolling:touch; }
.board { position:relative; width:1536px; max-width:none; aspect-ratio:3/2; margin:0 auto; overflow:hidden; border-radius:14px; border:1px solid #254a6f; background:#06101c; }
@media(min-width:1600px) { .board { width:100%; max-width:1536px; } }
.flagbg { position:absolute; inset:0; overflow:hidden; opacity:.10; z-index:0; }
.flagbg img { position:absolute; left:50%; top:50%; width:190%; height:190%; object-fit:cover; transform:translate(-50%,-50%) scale(1.08); image-rendering:pixelated; image-rendering:crisp-edges; filter:saturate(1.18) contrast(.92); }
.wash { position:absolute; inset:0; z-index:1; background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.36) 0,rgba(255,255,255,.20) 44%,rgba(255,255,255,.08) 100%),radial-gradient(circle at 50% 42%,rgba(4,10,20,.20) 0,rgba(4,10,20,.44) 62%,rgba(4,10,20,.70) 100%),linear-gradient(90deg,rgba(3,8,18,.42),rgba(3,8,18,.16) 32%,rgba(3,8,18,.16) 68%,rgba(3,8,18,.42)); }
.boardTemplate { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.96; pointer-events:none; z-index:2; }
.templateFallback { position:absolute; inset:0; z-index:2; pointer-events:none; background:linear-gradient(90deg,rgba(255,255,255,.08),rgba(255,255,255,.02),rgba(255,255,255,.08)); }
.topTitle { position:absolute; left:3%; right:3%; top:1.4%; height:9%; display:flex; align-items:center; justify-content:center; pointer-events:none; text-align:center; z-index:3; }
.topTitle h2 { margin:0; font-size:38px; letter-spacing:.04em; color:#f8fbff; text-shadow:0 2px 6px rgba(0,0,0,.8); }
.hotspot { position:absolute; z-index:10; border:2px solid rgba(255,227,77,.10); background:rgba(255,255,255,.06); border-radius:7px; padding:0; cursor:pointer; pointer-events:auto; }
.hotspot:hover,.hotspot.active { border-color:var(--accent); background:rgba(255,227,77,.22); box-shadow:0 0 0 2px rgba(255,227,77,.14); }
.hotspot .rule { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:950; font-size:12px; text-shadow:0 1px 2px rgba(0,0,0,.9); }
.hotspot.picked .rule { display:none; }
.hotspot .pick { position:absolute; inset:0; display:flex; align-items:center; gap:4px; justify-content:center; padding:2px 5px; color:#fff; font-weight:900; font-size:12px; line-height:1; text-shadow:0 1px 2px rgba(0,0,0,.9); }
.hotspot .flag { font-size:18px; }
.modalBackdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:1000; padding:18px; }
.modalBackdrop.open { display:flex; }
.modal { width:min(430px,94vw); max-height:88vh; overflow:auto; background:linear-gradient(180deg,#10243d,#071423); border:1px solid #4a739c; border-radius:18px; box-shadow:0 18px 60px rgba(0,0,0,.55); padding:16px; }
.modalHead { display:flex; justify-content:space-between; align-items:center; }
.closeBtn { font-size:22px; padding:5px 10px; background:#0a1728; }
.ruleBig { font-size:30px; color:var(--accent); font-weight:950; margin-top:12px; }
.long,.small { color:var(--muted); }
.choices { display:grid; gap:8px; margin-top:12px; }
.choice { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:#102844; }
.choice .flag { font-size:24px; width:30px; }
.choice .name { font-weight:850; }
.choice .meta { color:var(--muted); font-size:12px; margin-left:auto; }
.danger { background:#592234; border-color:#b44963; }
textarea { width:100%; min-height:110px; background:#06101c; color:var(--ink); border:1px solid #31577a; border-radius:12px; padding:10px; font-family:ui-monospace,monospace; font-size:12px; margin-top:10px; }
</style>
</head>
<body>
<header>
  <h1>World Cup 2026 Game 1</h1>
  <div class="sub">Tap a Round-of-32 slot. The chooser opens from the official slot rule.</div>
</header>
<div class="controls">
  <input id="playerName" placeholder="Player name"/>
  <label>Background <select id="bgTeam"></select></label>
  <button id="exportBtn">Export JSON</button>
  <button id="importBtn">Import JSON</button>
  <button id="clearBtn">Clear picks</button>
</div>
<main class="main">
  <section class="panel">
    <div class="status"><span id="pickedCount">0 / 32 picked</span><span id="hitStatus">hit testing active</span></div>
    <div class="scroller">
      <div class="board" id="board">
        <div class="flagbg"><img id="flagbgImg" alt="Selected background flag"/></div>
        <div class="wash"></div>
        <img class="boardTemplate" src="assets/playfield/r32_bracket_game_board_template.png" alt="32-team bracket game board template"/>
        <div class="topTitle"><h2>Pick the Round of 32</h2></div>
      </div>
    </div>
  </section>
</main>
<div class="modalBackdrop" id="modal">
  <div class="modal">
    <div class="modalHead"><h2>Choose team</h2><button class="closeBtn" id="closeModal">×</button></div>
    <div id="slotInfo"></div>
    <div class="choices" id="choices"></div>
    <p><button class="danger" id="deletePick">Delete this pick</button></p>
    <p class="small">Picks save in this browser and can be exported/imported.</p>
    <textarea id="jsonBox"></textarea>
  </div>
</div>
<script>
const TEAMS = [{"group": "A", "name": "Mexico", "display": "Mexico", "abbr": "MEX", "flag": "🇲🇽"}, {"group": "A", "name": "South Africa", "display": "South Africa", "abbr": "RSA", "flag": "🇿🇦"}, {"group": "A", "name": "Korea Republic", "display": "South Korea", "abbr": "KOR", "flag": "🇰🇷"}, {"group": "A", "name": "Czechia", "display": "Czechia", "abbr": "CZE", "flag": "🇨🇿"}, {"group": "B", "name": "Canada", "display": "Canada", "abbr": "CAN", "flag": "🇨🇦"}, {"group": "B", "name": "Bosnia-Herzegovina", "display": "Bosnia-Herzegovina", "abbr": "BIH", "flag": "🇧🇦"}, {"group": "B", "name": "Qatar", "display": "Qatar", "abbr": "QAT", "flag": "🇶🇦"}, {"group": "B", "name": "Switzerland", "display": "Switzerland", "abbr": "SUI", "flag": "🇨🇭"}, {"group": "C", "name": "Brazil", "display": "Brazil", "abbr": "BRA", "flag": "🇧🇷"}, {"group": "C", "name": "Morocco", "display": "Morocco", "abbr": "MAR", "flag": "🇲🇦"}, {"group": "C", "name": "Haiti", "display": "Haiti", "abbr": "HAI", "flag": "🇭🇹"}, {"group": "C", "name": "Scotland", "display": "Scotland", "abbr": "SCO", "flag": "🏴"}, {"group": "D", "name": "USA", "display": "USA", "abbr": "USA", "flag": "🇺🇸"}, {"group": "D", "name": "Paraguay", "display": "Paraguay", "abbr": "PAR", "flag": "🇵🇾"}, {"group": "D", "name": "Australia", "display": "Australia", "abbr": "AUS", "flag": "🇦🇺"}, {"group": "D", "name": "Türkiye", "display": "Turkiye", "abbr": "TUR", "flag": "🇹🇷"}, {"group": "E", "name": "Germany", "display": "Germany", "abbr": "GER", "flag": "🇩🇪"}, {"group": "E", "name": "Curaçao", "display": "Curacao", "abbr": "CUW", "flag": "🇨🇼"}, {"group": "E", "name": "Côte d’Ivoire", "display": "Ivory Coast", "abbr": "CIV", "flag": "🇨🇮"}, {"group": "E", "name": "Ecuador", "display": "Ecuador", "abbr": "ECU", "flag": "🇪🇨"}, {"group": "F", "name": "Netherlands", "display": "Netherlands", "abbr": "NED", "flag": "🇳🇱"}, {"group": "F", "name": "Japan", "display": "Japan", "abbr": "JPN", "flag": "🇯🇵"}, {"group": "F", "name": "Sweden", "display": "Sweden", "abbr": "SWE", "flag": "🇸🇪"}, {"group": "F", "name": "Tunisia", "display": "Tunisia", "abbr": "TUN", "flag": "🇹🇳"}, {"group": "G", "name": "Belgium", "display": "Belgium", "abbr": "BEL", "flag": "🇧🇪"}, {"group": "G", "name": "Egypt", "display": "Egypt", "abbr": "EGY", "flag": "🇪🇬"}, {"group": "G", "name": "IR Iran", "display": "Iran", "abbr": "IRN", "flag": "🇮🇷"}, {"group": "G", "name": "New Zealand", "display": "New Zealand", "abbr": "NZL", "flag": "🇳🇿"}, {"group": "H", "name": "Spain", "display": "Spain", "abbr": "ESP", "flag": "🇪🇸"}, {"group": "H", "name": "Cabo Verde", "display": "Cape Verde", "abbr": "CPV", "flag": "🇨🇻"}, {"group": "H", "name": "Saudi Arabia", "display": "Saudi Arabia", "abbr": "KSA", "flag": "🇸🇦"}, {"group": "H", "name": "Uruguay", "display": "Uruguay", "abbr": "URU", "flag": "🇺🇾"}, {"group": "I", "name": "France", "display": "France", "abbr": "FRA", "flag": "🇫🇷"}, {"group": "I", "name": "Senegal", "display": "Senegal", "abbr": "SEN", "flag": "🇸🇳"}, {"group": "I", "name": "Iraq", "display": "Iraq", "abbr": "IRQ", "flag": "🇮🇶"}, {"group": "I", "name": "Norway", "display": "Norway", "abbr": "NOR", "flag": "🇳🇴"}, {"group": "J", "name": "Argentina", "display": "Argentina", "abbr": "ARG", "flag": "🇦🇷"}, {"group": "J", "name": "Algeria", "display": "Algeria", "abbr": "ALG", "flag": "🇩🇿"}, {"group": "J", "name": "Austria", "display": "Austria", "abbr": "AUT", "flag": "🇦🇹"}, {"group": "J", "name": "Jordan", "display": "Jordan", "abbr": "JOR", "flag": "🇯🇴"}, {"group": "K", "name": "Portugal", "display": "Portugal", "abbr": "POR", "flag": "🇵🇹"}, {"group": "K", "name": "Congo DR", "display": "DR Congo", "abbr": "COD", "flag": "🇨🇩"}, {"group": "K", "name": "Uzbekistan", "display": "Uzbekistan", "abbr": "UZB", "flag": "🇺🇿"}, {"group": "K", "name": "Colombia", "display": "Colombia", "abbr": "COL", "flag": "🇨🇴"}, {"group": "L", "name": "England", "display": "England", "abbr": "ENG", "flag": "🏴"}, {"group": "L", "name": "Croatia", "display": "Croatia", "abbr": "CRO", "flag": "🇭🇷"}, {"group": "L", "name": "Ghana", "display": "Ghana", "abbr": "GHA", "flag": "🇬🇭"}, {"group": "L", "name": "Panama", "display": "Panama", "abbr": "PAN", "flag": "🇵🇦"}];
const RULES = {"R32-L-M1A": {"match": 73, "short": "2A", "long": "Runner-up Group A"}, "R32-L-M1B": {"match": 73, "short": "2B", "long": "Runner-up Group B"}, "R32-L-M2A": {"match": 75, "short": "1F", "long": "Winner Group F"}, "R32-L-M2B": {"match": 75, "short": "2C", "long": "Runner-up Group C"}, "R32-L-M3A": {"match": 74, "short": "1E", "long": "Winner Group E"}, "R32-L-M3B": {"match": 74, "short": "3 A/B/C/D/F", "long": "Best third-place team from Groups A/B/C/D/F"}, "R32-L-M4A": {"match": 77, "short": "1I", "long": "Winner Group I"}, "R32-L-M4B": {"match": 77, "short": "3 C/D/F/G/H", "long": "Best third-place team from Groups C/D/F/G/H"}, "R32-L-M5A": {"match": 76, "short": "1C", "long": "Winner Group C"}, "R32-L-M5B": {"match": 76, "short": "2F", "long": "Runner-up Group F"}, "R32-L-M6A": {"match": 78, "short": "2E", "long": "Runner-up Group E"}, "R32-L-M6B": {"match": 78, "short": "2I", "long": "Runner-up Group I"}, "R32-L-M7A": {"match": 79, "short": "1A", "long": "Winner Group A"}, "R32-L-M7B": {"match": 79, "short": "3 C/E/F/H/I", "long": "Best third-place team from Groups C/E/F/H/I"}, "R32-L-M8A": {"match": 80, "short": "1L", "long": "Winner Group L"}, "R32-L-M8B": {"match": 80, "short": "3 E/H/I/J/K", "long": "Best third-place team from Groups E/H/I/J/K"}, "R32-R-M1A": {"match": 83, "short": "2K", "long": "Runner-up Group K"}, "R32-R-M1B": {"match": 83, "short": "2L", "long": "Runner-up Group L"}, "R32-R-M2A": {"match": 84, "short": "1H", "long": "Winner Group H"}, "R32-R-M2B": {"match": 84, "short": "2J", "long": "Runner-up Group J"}, "R32-R-M3A": {"match": 81, "short": "1D", "long": "Winner Group D"}, "R32-R-M3B": {"match": 81, "short": "3 B/E/F/I/J", "long": "Best third-place team from Groups B/E/F/I/J"}, "R32-R-M4A": {"match": 82, "short": "1G", "long": "Winner Group G"}, "R32-R-M4B": {"match": 82, "short": "3 A/E/H/I/J", "long": "Best third-place team from Groups A/E/H/I/J"}, "R32-R-M5A": {"match": 86, "short": "1J", "long": "Winner Group J"}, "R32-R-M5B": {"match": 86, "short": "2H", "long": "Runner-up Group H"}, "R32-R-M6A": {"match": 88, "short": "2D", "long": "Runner-up Group D"}, "R32-R-M6B": {"match": 88, "short": "2G", "long": "Runner-up Group G"}, "R32-R-M7A": {"match": 85, "short": "1B", "long": "Winner Group B"}, "R32-R-M7B": {"match": 85, "short": "3 E/F/G/I/J", "long": "Best third-place team from Groups E/F/G/I/J"}, "R32-R-M8A": {"match": 87, "short": "1K", "long": "Winner Group K"}, "R32-R-M8B": {"match": 87, "short": "3 D/E/I/J/L", "long": "Best third-place team from Groups D/E/I/J/L"}};
const HOTSPOTS = [["R32-L-M1A", 2.5, 13.8, 8.9, 4.0], ["R32-L-M1B", 2.5, 18.2, 8.9, 4.0], ["R32-L-M2A", 2.5, 23.0, 8.9, 4.0], ["R32-L-M2B", 2.5, 27.4, 8.9, 4.0], ["R32-L-M3A", 2.5, 32.2, 8.9, 4.0], ["R32-L-M3B", 2.5, 36.6, 8.9, 4.0], ["R32-L-M4A", 2.5, 41.4, 8.9, 4.0], ["R32-L-M4B", 2.5, 45.8, 8.9, 4.0], ["R32-L-M5A", 2.5, 51.0, 8.9, 4.0], ["R32-L-M5B", 2.5, 55.4, 8.9, 4.0], ["R32-L-M6A", 2.5, 60.2, 8.9, 4.0], ["R32-L-M6B", 2.5, 64.6, 8.9, 4.0], ["R32-L-M7A", 2.5, 69.4, 8.9, 4.0], ["R32-L-M7B", 2.5, 73.8, 8.9, 4.0], ["R32-L-M8A", 2.5, 78.6, 8.9, 4.0], ["R32-L-M8B", 2.5, 83.0, 8.9, 4.0], ["R32-R-M1A", 88.6, 13.8, 8.9, 4.0], ["R32-R-M1B", 88.6, 18.2, 8.9, 4.0], ["R32-R-M2A", 88.6, 23.0, 8.9, 4.0], ["R32-R-M2B", 88.6, 27.4, 8.9, 4.0], ["R32-R-M3A", 88.6, 32.2, 8.9, 4.0], ["R32-R-M3B", 88.6, 36.6, 8.9, 4.0], ["R32-R-M4A", 88.6, 41.4, 8.9, 4.0], ["R32-R-M4B", 88.6, 45.8, 8.9, 4.0], ["R32-R-M5A", 88.6, 51.0, 8.9, 4.0], ["R32-R-M5B", 88.6, 55.4, 8.9, 4.0], ["R32-R-M6A", 88.6, 60.2, 8.9, 4.0], ["R32-R-M6B", 88.6, 64.6, 8.9, 4.0], ["R32-R-M7A", 88.6, 69.4, 8.9, 4.0], ["R32-R-M7B", 88.6, 73.8, 8.9, 4.0], ["R32-R-M8A", 88.6, 78.6, 8.9, 4.0], ["R32-R-M8B", 88.6, 83.0, 8.9, 4.0]];
const STORAGE_KEY = "wc2026.game1.repaired.hit.testing.v1";
let state = {version:"game1-repaired-hit-testing-v1",playerName:"",backgroundTeamAbbr:"USA",backgroundTeamLocked:false,picks:{}};
let activeSlot = null;

function team(abbr){return TEAMS.find(t=>t.abbr===abbr)||TEAMS.find(t=>t.abbr==="USA")||TEAMS[0]}
function flagSvgUrl(t){
  const flag = (t && t.flag) ? t.flag : "🇺🇸";
  const label = (t && (t.display || t.name || t.abbr)) ? (t.display || t.name || t.abbr) : "USA";
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" shape-rendering="crispEdges"><rect width="64" height="40" fill="#06101c"/><text x="32" y="28" text-anchor="middle" font-size="30" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">${flag}</text><title>${label}</title></svg>`;
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}
function renderBackgroundFlag(){
  const t = team(state.backgroundTeamAbbr || "USA");
  const img = document.getElementById("flagbgImg");
  img.src = flagSvgUrl(t);
  img.alt = `${t.display || t.name || t.abbr} flag background`;
}
function load(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)state=JSON.parse(s)}catch(e){}document.getElementById("playerName").value=state.playerName||""}
function save(){state.playerName=document.getElementById("playerName").value||"";localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function bgSelect(){
  const sel=document.getElementById("bgTeam");
  sel.innerHTML="";
  TEAMS.forEach(t=>{const o=document.createElement("option");o.value=t.abbr;o.textContent=`${t.flag} ${t.display||t.name}`;sel.appendChild(o)});
  sel.value=state.backgroundTeamAbbr||"USA";
  renderBackgroundFlag();
}
function groupsForRule(s){if(!s)return[];if((s[0]==="1"||s[0]==="2")&&s.length>=2)return[s[1]];if(s.startsWith("3"))return[...s.matchAll(/[A-L]/g)].map(m=>m[0]);return[]}
function choicesFor(slot){const r=RULES[slot];if(!r)return[];return groupsForRule(r.short).flatMap(g=>TEAMS.filter(t=>t.group===g))}
function adoptFirstPickBackground(t){if(state.backgroundTeamLocked)return;if(!state.backgroundTeamAbbr||state.backgroundTeamAbbr==="USA"){state.backgroundTeamAbbr=t.abbr||"USA";document.getElementById("bgTeam").value=state.backgroundTeamAbbr;}}
function makeHotspots(){
  const b=document.getElementById("board");
  document.querySelectorAll(".hotspot").forEach(n=>n.remove());
  HOTSPOTS.forEach(([id,x,y,w,h])=>{
    const hbtn=document.createElement("button");
    hbtn.type="button";
    hbtn.className="hotspot";
    hbtn.dataset.slot=id;
    Object.assign(hbtn.style,{left:x+"%",top:y+"%",width:w+"%",height:h+"%"});
    hbtn.addEventListener("click",()=>openChooser(id));
    b.appendChild(hbtn);
  });
  document.getElementById("hitStatus").textContent = `${HOTSPOTS.length} hotspots active`;
}
function openChooser(slot){
  activeSlot=slot;
  const r=RULES[slot], pick=state.picks[slot];
  if(!r){ alert("Missing rule for " + slot); return; }
  document.querySelectorAll(".hotspot").forEach(h=>h.classList.toggle("active",h.dataset.slot===slot));
  slotInfo.innerHTML=`<div class="ruleBig">${r.short}</div><div class="long">Match ${r.match}: ${r.long}</div><div class="small">Slot: ${slot}${pick?" - Picked: "+pick.name:""}</div>`;
  choices.innerHTML="";
  choicesFor(slot).forEach(t=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="choice";
    btn.innerHTML=`<span class="flag">${t.flag}</span><span class="name">${t.display||t.name}</span><span class="meta">G${t.group}</span>`;
    btn.addEventListener("click",()=>{
      state.picks[slot]={slotId:slot,rule:r,name:t.name,display:t.display,abbr:t.abbr,flag:t.flag,group:t.group};
      adoptFirstPickBackground(t);
      save();
      render();
      modal.classList.remove("open");
    });
    choices.appendChild(btn);
  });
  deletePick.style.display=pick?"inline-block":"none";
  modal.classList.add("open");
}
function render(){
  document.querySelectorAll(".hotspot").forEach(h=>{
    const p=state.picks[h.dataset.slot], r=RULES[h.dataset.slot];
    h.innerHTML=p?`<span class="pick"><span class="flag">${p.flag}</span><span>${p.display||p.name}</span></span>`:`<span class="rule">${r?.short||""}</span>`;
    h.classList.toggle("picked",!!p);
  });
  pickedCount.textContent=`${Object.keys(state.picks).length} / 32 picked`;
  renderBackgroundFlag();
}
playerName.addEventListener("input",save);
bgTeam.addEventListener("change",e=>{state.backgroundTeamAbbr=e.target.value;state.backgroundTeamLocked=true;save();render();});
closeModal.addEventListener("click",()=>modal.classList.remove("open"));
modal.addEventListener("click",e=>{if(e.target.id==="modal")modal.classList.remove("open");});
deletePick.addEventListener("click",()=>{if(activeSlot)delete state.picks[activeSlot];save();render();modal.classList.remove("open");});
exportBtn.addEventListener("click",()=>{save();jsonBox.value=JSON.stringify(state,null,2);modal.classList.add("open");});
importBtn.addEventListener("click",()=>{modal.classList.add("open");jsonBox.focus();});
jsonBox.addEventListener("change",()=>{try{state=JSON.parse(jsonBox.value);save();bgSelect();render();}catch(e){alert(e.message);}});

load();bgSelect();makeHotspots();render();
</script>
