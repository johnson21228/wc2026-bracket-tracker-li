<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup 2026 Game 1 - Layered Playfield</title>
<style>

const STORAGE_KEY="wc2026.game1.layered.bracketonly.v1";
let state={version:"game1-layered-bracket-only-v1",playerName:"",backgroundTeamAbbr:"USA",picks:{}}, activeSlot=null;
const mid=document.getElementById("mid");
function div(cls,x,y,w,h){const d=document.createElement("div");d.className=cls;Object.assign(d.style,{left:x+"%",top:y+"%",width:w+"%",height:h+"%"});mid.appendChild(d);return d}
function draw(){HOTSPOTS.forEach(([id,x,y,w,h])=>div("box",x,y,w,h));[[14,16,8.5,4.3],[14,25,8.5,4.3],[14,34,8.5,4.3],[14,43,8.5,4.3],[14,52,8.5,4.3],[14,61,8.5,4.3],[14,70,8.5,4.3],[14,79,8.5,4.3],[77.5,16,8.5,4.3],[77.5,25,8.5,4.3],[77.5,34,8.5,4.3],[77.5,43,8.5,4.3],[77.5,52,8.5,4.3],[77.5,61,8.5,4.3],[77.5,70,8.5,4.3],[77.5,79,8.5,4.3]].forEach(a=>div("box adv",...a));[[25.5,21,8,4.8],[25.5,39,8,4.8],[25.5,57,8,4.8],[25.5,75,8,4.8],[66.5,21,8,4.8],[66.5,39,8,4.8],[66.5,57,8,4.8],[66.5,75,8,4.8],[36.5,30,8,6.5],[36.5,64,8,6.5],[55.7,30,8,6.5],[55.7,64,8,6.5],[44.2,43,11.6,7.6]].forEach(a=>div("box final",...a));}
function team(abbr){return TEAMS.find(t=>t.abbr===abbr)||TEAMS.find(t=>t.abbr==="USA")||TEAMS[0]}
function load(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)state=JSON.parse(s)}catch(e){}document.getElementById("playerName").value=state.playerName||""}
function save(){state.playerName=document.getElementById("playerName").value||"";localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function bgSelect(){const sel=document.getElementById("bgTeam");sel.innerHTML="";TEAMS.forEach(t=>{const o=document.createElement("option");o.value=t.abbr;o.textContent=`${t.flag} ${t.display||t.name}`;sel.appendChild(o)});sel.value=state.backgroundTeamAbbr||"USA";flagbg.textContent=team(sel.value).flag||"🇺🇸"}
function groupsForRule(s){if(!s)return[];if((s[0]==="1"||s[0]==="2")&&s.length>=2)return[s[1]];if(s.startsWith("3"))return[...s.matchAll(/[A-L]/g)].map(m=>m[0]);return[]}
function choicesFor(slot){const r=RULES[slot];return groupsForRule(r.short).flatMap(g=>TEAMS.filter(t=>t.group===g))}
function hotspots(){const b=document.getElementById("board");HOTSPOTS.forEach(([id,x,y,w,h])=>{const hbtn=document.createElement("button");hbtn.className="hotspot";hbtn.dataset.slot=id;Object.assign(hbtn.style,{left:x+"%",top:y+"%",width:w+"%",height:h+"%"});hbtn.onclick=()=>openChooser(id);b.appendChild(hbtn)})}
function openChooser(slot){activeSlot=slot;const r=RULES[slot],pick=state.picks[slot];slotInfo.innerHTML=`<div class="ruleBig">${r.short}</div><div class="long">Match ${r.match}: ${r.long}</div><div class="small">Slot: ${slot}${pick?" - Picked: "+pick.name:""}</div>`;choices.innerHTML="";choicesFor(slot).forEach(t=>{const btn=document.createElement("button");btn.className="choice";btn.innerHTML=`<span class="flag">${t.flag}</span><span class="name">${t.display||t.name}</span><span class="meta">G${t.group}</span>`;btn.onclick=()=>{state.picks[slot]={slotId:slot,rule:r,name:t.name,display:t.display,abbr:t.abbr,flag:t.flag,group:t.group};save();render();modal.classList.remove("open")};choices.appendChild(btn)});deletePick.style.display=pick?"inline-block":"none";modal.classList.add("open")}
